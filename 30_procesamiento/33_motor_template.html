<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Motor de comparación Simce — proporción de estudiantes en nivel Adecuado</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A3A5C'/%3E%3Crect x='8' y='15' width='4' height='9' rx='1' fill='%23FFF6E0'/%3E%3Crect x='14' y='10' width='4' height='14' rx='1' fill='%23FFF6E0'/%3E%3Crect x='20' y='6' width='4' height='18' rx='1' fill='%23C45A3E'/%3E%3C/svg%3E" />
<style>
/* ============================================================
   SLEP Costa Central — colores y tipografía (sin @font-face;
   los .otf gobCL/Museo Sans no están versionados, así que se
   usa el stack system como fallback).
   ============================================================ */

:root {
  /* Mark colors */
  --mark-red:    #EE2D49;
  --mark-pink:   #F8A0AE;
  --mark-yellow: #FFC92E;
  --mark-green:  #9BC93E;
  --mark-blue:   #2A8FD9;

  /* Brand palette */
  --plum:        #4A2746;
  --cream:       #FFF6E0;
  --ocean:       #0062A0;
  --slate:       #747474;
  --olive:       #75924E;
  --sand:        #BCA493;
  --coral:       #E88663;

  /* Neutrals derivados */
  --ink:         #1C1212;
  --ink-2:       #2E2230;
  --paper:       #FFFFFF;
  --cream-50:    #FFFBEF;
  --cream-200:   #F4E9CC;
  --line:        #E7DFC9;
  --line-strong: #C8BDA0;
  --plum-80:     #66394F;
  --plum-20:     #EEDCE5;
  --ocean-80:    #00558A;
  --ocean-20:    #D4E4F1;

  /* Semánticos */
  --fg-1: var(--ink);
  --fg-2: var(--ink-2);
  --fg-3: var(--slate);
  --fg-on-dark: var(--cream);
  --fg-on-plum: var(--cream);
  --fg-link: var(--ocean);
  --bg-1: var(--cream);
  --bg-2: var(--paper);
  --bg-3: var(--cream-50);
  --bg-inverse: var(--plum);
  --accent: var(--coral);
  --success: var(--olive);
  --info: var(--ocean);
  --warning: var(--mark-yellow);
  --danger: var(--mark-red);
  --border-1: var(--line);
  --border-2: var(--line-strong);
  --border-strong: var(--plum);

  /* Spacing */
  --space-0: 0;     --space-1: 4px;   --space-2: 8px;   --space-3: 12px;
  --space-4: 16px;  --space-5: 24px;  --space-6: 32px;  --space-7: 48px;
  --space-8: 64px;  --space-9: 96px;

  /* Radii */
  --radius-0: 0; --radius-1: 2px; --radius-2: 4px; --radius-3: 8px;
  --radius-full: 9999px;

  /* Elevation */
  --shadow-1: 0 1px 0 rgba(28, 18, 18, 0.05);
  --shadow-2: 0 2px 8px rgba(74, 39, 70, 0.08);
  --shadow-3: 0 8px 24px rgba(74, 39, 70, 0.12);

  /* Type families — fallback al stack system. Cuando se versionen los
     .otf de gobCL/Museo Sans, agregar @font-face antes y usarlos arriba. */
  --font-display: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-body:    system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono:    ui-monospace, "SF Mono", "Menlo", monospace;

  /* Type scale */
  --fs-display-1: clamp(48px, 6vw, 88px);
  --fs-display-2: clamp(36px, 4.5vw, 64px);
  --fs-h1: clamp(32px, 3.4vw, 44px);
  --fs-h2: 28px;
  --fs-h3: 22px;
  --fs-h4: 18px;
  --fs-body: 16px;
  --fs-body-lg: 18px;
  --fs-caption: 14px;
  --fs-overline: 12px;

  --lh-tight: 1.05;
  --lh-snug: 1.2;
  --lh-normal: 1.5;
  --lh-loose: 1.65;

  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.06em;
  --tracking-overline: 0.12em;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg-1);
  color: var(--fg-1);
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 15px;
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--mark-yellow); color: var(--ink); }

/* ============================================================
   App layout
   ============================================================ */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.app.is-comfy   { font-size: 15px; }

/* Header */
.app-header {
  background: #0A3A5C;
  color: var(--fg-on-plum);
  padding: 28px 40px 26px;
}
.app-header-inner {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; max-width: 1600px; margin: 0 auto;
}
.app-header-left { min-width: 0; }
.app-header-right { display: flex; align-items: center; gap: 8px; }
.brand-lockup { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.brand-eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: var(--tracking-overline);
  color: var(--cream);
  opacity: 0.9;
}
.brand-eyebrow-muted { opacity: 0.6; font-weight: 400; }
.brand-divider { color: var(--cream); opacity: 0.4; }
.app-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 30px;
  letter-spacing: -0.005em;
  color: var(--cream);
  line-height: 1.1;
  margin: 0 0 6px 0;
}
.app-title-sub { font-weight: 400; font-size: 22px; color: var(--cream); opacity: 0.78; }
.app-subtitle {
  font-family: var(--font-body);
  color: var(--cream); opacity: 0.75;
  margin: 0; font-size: 13px; line-height: 1.5;
}
.app-objective {
  font-family: var(--font-body);
  color: var(--cream); opacity: 0.82;
  margin: 8px 0 0 0; font-size: 12px; line-height: 1.6;
  max-width: 820px;
}
.app-objective strong { font-weight: 700; opacity: 1; }

/* Main */
.app-main { flex: 1; max-width: 1600px; margin: 0 auto; width: 100%; }

/* Controles */
.controls-bar {
  display: flex; align-items: center; gap: 28px;
  padding: 18px 40px;
  background: var(--paper);
  border-top: 4px solid var(--coral);
  border-bottom: 1px solid var(--border-1);
  flex-wrap: wrap;
  position: sticky; top: 0; z-index: 50;
}
.control-group { display: flex; align-items: center; gap: 12px; }
.control-label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: var(--tracking-overline);
  color: var(--fg-3);
}
.segmented {
  display: inline-flex;
  background: var(--cream-200);
  border: 1px solid var(--border-1);
  border-radius: var(--radius-2);
  padding: 2px;
}
.segmented-btn {
  background: transparent; border: 0;
  padding: 6px 14px;
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  color: var(--fg-2);
  border-radius: var(--radius-1);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.segmented-btn:hover { color: var(--fg-1); }
.segmented-btn.is-active {
  background: var(--paper);
  color: var(--plum);
  font-weight: 700;
  box-shadow: var(--shadow-1);
}
.select, .input {
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 13px;
  color: var(--fg-1);
  background: var(--paper);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-2);
  padding: 6px 28px 6px 10px;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23747474' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 14px 14px;
  cursor: pointer;
  min-width: 140px;
}
.select:focus, .input:focus {
  outline: 2px solid var(--ocean);
  outline-offset: 1px;
  border-color: var(--ocean);
}
.input {
  background-image: none; padding-right: 10px;
  cursor: text; min-width: 0; width: 100%;
}
.controls-spacer { flex: 1; }
.loading-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 4px 12px;
  background: var(--ocean-20); color: var(--ocean-80);
  border-radius: var(--radius-full);
  font-size: 12px; font-weight: 500;
}
.loading-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--ocean);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* Entities */
.entities-bar {
  padding: 20px 40px 22px;
  background: var(--bg-3);
  border-bottom: 1px solid var(--border-1);
}
.entities-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 12px;
}
.entities-reset { align-self: center; color: var(--fg-3); flex: none; }
.entities-reset:hover { color: var(--fg-1); }
.section-eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: var(--tracking-overline);
  color: var(--fg-3);
  margin: 0;
}
.entities-count { font-size: 12px; color: var(--fg-3); font-weight: 500; }
.entities-list { display: flex; flex-wrap: wrap; gap: 8px; align-items: stretch; }
.entity-chip {
  display: inline-flex; align-items: flex-start; gap: 8px;
  padding: 6px 8px 6px 10px;
  background: var(--paper);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-2);
  transition: border-color 120ms ease;
  max-width: 340px; flex: 0 1 auto;
}
.entity-chip:hover { border-color: var(--plum); }
.entity-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
.entity-text { display: flex; flex-direction: column; line-height: 1.1; }
.entity-name {
  font-family: var(--font-body);
  font-weight: 700; font-size: 13px; color: var(--fg-1);
}
.entity-meta { font-size: 11px; color: var(--fg-3); margin-top: 2px; font-weight: 500; }
.entity-btn {
  background: transparent; border: 0;
  padding: 4px; color: var(--fg-3); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-1);
}
.entity-btn:hover { background: var(--cream-200); color: var(--fg-1); }
.entity-btn-remove:hover { background: #fce7e7; color: var(--mark-red); }
.entity-btn .icon { width: 14px; height: 14px; }
.entities-actions {
  display: inline-flex; align-items: center; gap: 8px; margin-left: 4px;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid transparent;
  padding: 7px 14px;
  border-radius: var(--radius-2);
  font-family: var(--font-body);
  font-weight: 500; font-size: 13px;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease, transform 80ms ease;
  text-decoration: none;
}
.btn:active { transform: translateY(1px); }
.btn .icon { width: 14px; height: 14px; }
.btn-small { padding: 5px 10px; font-size: 12px; }
.btn-icon-only { padding: 6px; }
.btn-icon-only .icon { width: 16px; height: 16px; }
.btn-toggle { color: var(--fg-2); }
.btn-toggle.is-active {
  background: var(--ocean); color: var(--cream); border-color: var(--ocean);
}
.btn-toggle.is-active:hover { background: var(--ocean-80); border-color: var(--ocean-80); }
.btn-primary { background: var(--ocean); color: var(--cream); border-color: var(--ocean); }
.btn-primary:hover { background: var(--ocean-80); border-color: var(--ocean-80); }
.btn-ghost { background: transparent; color: var(--fg-1); border-color: var(--border-2); }
.btn-ghost:hover { background: var(--cream-200); border-color: var(--plum); }
.app-header-right .btn-ghost {
  background: rgba(255,246,224,0.06);
  color: var(--cream);
  border-color: rgba(255,246,224,0.2);
}
.app-header-right .btn-ghost:hover {
  background: rgba(255,246,224,0.12);
  border-color: rgba(255,246,224,0.4);
}
.icon-btn {
  background: transparent; border: 0;
  padding: 6px; cursor: pointer;
  color: var(--fg-2); border-radius: var(--radius-1);
  display: inline-flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: var(--cream-200); color: var(--fg-1); }
.icon-btn .icon { width: 18px; height: 18px; }
.icon { display: inline-block; vertical-align: middle; }

/* Results */
.results-section { padding: 28px 40px 8px; }
.empty-board {
  margin: 28px 40px; padding: 56px 32px;
  display: flex; flex-direction: column; align-items: center; text-align: center;
  gap: 10px;
  border: 1px dashed var(--border-2); border-radius: var(--radius-2);
  background: var(--cream-200);
}
.empty-board-text { font-size: 16px; color: var(--fg-2); margin: 0; max-width: 520px; line-height: 1.5; }
.results-head {
  display: flex; flex-direction: column; align-items: stretch;
  gap: 14px; margin-bottom: 18px;
}
.results-head-top { display: flex; flex-direction: column; gap: 2px; }
/* Fila única bajo el título: controles a la izquierda, leyenda a la
   derecha (mockup). En pantallas angostas envuelve sin romperse. */
.results-head-controls {
  display: flex; align-items: center; justify-content: flex-start;
  gap: 16px 24px; flex-wrap: wrap;
}
.section-actions {
  display: flex; align-items: center; gap: 14px;
  flex-wrap: wrap; justify-content: flex-start;
}
/* La cabecera de la tabla conserva el layout horizontal (título a la
   izquierda, controles a la derecha). */
.table-head { justify-content: space-between; }
.table-head .section-actions { justify-content: flex-end; }
.icon-export {
  display: inline-flex; align-items: center; gap: 0;
  height: 32px; padding: 0 8px;
  background: transparent;
  border: 1px solid var(--border-2);
  border-radius: var(--radius-2);
  color: var(--fg-2); cursor: pointer;
  font-family: var(--font-body);
  font-weight: 500; font-size: 13px;
  overflow: hidden; max-width: 36px; white-space: nowrap;
  transition: max-width 240ms ease, background 120ms ease, color 120ms ease, border-color 120ms ease, gap 240ms ease;
}
.icon-export:hover, .icon-export:focus-visible {
  max-width: 220px; gap: 8px;
  background: var(--paper); border-color: #0A3A5C; color: #0A3A5C;
}
.icon-export .icon { width: 16px; height: 16px; flex-shrink: 0; }
.icon-export-label {
  opacity: 0; transform: translateX(-4px);
  transition: opacity 200ms ease 80ms, transform 200ms ease 80ms;
}
.icon-export:hover .icon-export-label,
.icon-export:focus-visible .icon-export-label {
  opacity: 1; transform: translateX(0);
}

.chart-hints {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 14px; font-size: 12px;
}
.hint-item { display: inline-flex; align-items: center; gap: 6px; color: var(--fg-1); }
.hint-muted { color: var(--fg-3); font-size: 11px; }
.hint-box {
  display: inline-block; width: 14px; height: 12px;
  border: 1px solid rgba(0,0,0,0.12); border-radius: 1px;
}
.hint-low-n {
  display: inline-block; width: 14px; height: 12px;
  background: #0A3A5C; opacity: 0.45; border-radius: 1px;
}
.hint-asterisk {
  display: inline-flex; align-items: center;
  font-weight: 900; color: var(--ocean); font-size: 15px;
  line-height: 0.6; width: 14px; justify-content: center;
}

.supergrid { display: grid; gap: 10px 12px; align-items: stretch; }
.supergrid-entity-head {
  display: flex; flex-direction: column;
  gap: 4px; padding: 4px 4px 6px;
  border-bottom: 2px solid var(--border-strong);
}
.supergrid-entity-head .entity-swatch { width: 16px; height: 16px; border-radius: 2px; }
.sg-ent-name {
  font-family: var(--font-display);
  font-weight: 800; font-size: 17px;
  color: var(--fg-1);
  letter-spacing: -0.005em; line-height: 1.1;
}
.sg-ent-meta { font-size: 11px; color: var(--fg-3); font-weight: 500; }
.supergrid-gse-label {
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 6px 6px 6px 0;
  border-right: 1px solid var(--border-1);
}
.sg-gse-eyebrow {
  font-family: var(--font-display);
  font-weight: 700; font-size: 10px;
  letter-spacing: var(--tracking-overline);
  color: var(--fg-3);
}
.sg-gse-name {
  font-family: var(--font-display);
  font-weight: 800; font-size: 18px;
  color: #0A3A5C;
  letter-spacing: -0.005em; line-height: 1.1; margin-top: 2px;
}

.chart-cell {
  background: var(--paper);
  border: 1px solid var(--border-1);
  /* Un estilo inline sobrescribe el borde completo con el color de la
     entidad (1px), rodeando la ficha para identificar la columna. */
  border-radius: var(--radius-3);
  padding: 10px 10px 6px;
  box-shadow: var(--shadow-1);
  display: flex; flex-direction: column;
  gap: 4px; min-width: 0;
}
.chart-cell-head { display: flex; align-items: baseline; gap: 5px; margin-bottom: 2px; }
.chart-cell-eyebrow {
  font-family: var(--font-display);
  font-weight: 700; font-size: 9px;
  letter-spacing: var(--tracking-overline);
  color: var(--fg-3);
}
.chart-cell-title {
  font-family: var(--font-display);
  font-weight: 800; font-size: 13px;
  letter-spacing: -0.005em;
  color: #0A3A5C;
}
.sub-section { display: flex; flex-direction: column; gap: 0; min-width: 0; }
.sub-section-bars { padding-top: 6px; margin-top: 2px; border-top: 1px dashed var(--border-1); }
.sub-eyebrow {
  font-family: var(--font-display);
  font-weight: 700; font-size: 9px;
  letter-spacing: var(--tracking-overline);
  color: var(--fg-3);
  padding-left: 2px; margin-bottom: 2px;
}
.sparkline-svg, .bars-svg, .chart-svg { width: 100%; height: auto; display: block; overflow: visible; }
.results-title {
  font-family: var(--font-display);
  font-weight: 800; font-size: 24px;
  letter-spacing: -0.005em;
  color: var(--fg-1);
  margin: 4px 0 0 0; line-height: 1.2;
}
.results-title-year { color: var(--ocean); }

/* Tooltip */
.tooltip {
  position: absolute; pointer-events: none; z-index: 9999;
  background: var(--paper); color: var(--fg-1);
  border: 1px solid var(--border-2);
  border-radius: var(--radius-2);
  box-shadow: var(--shadow-3);
  padding: 10px 12px;
  font-size: 12px;
  min-width: 200px; max-width: 280px;
}
.tooltip.is-pinned {
  pointer-events: auto;
  border-color: var(--ocean);
  box-shadow: var(--shadow-3), 0 0 0 2px var(--ocean-20);
}
.tt-row { display: flex; align-items: center; gap: 6px; }
.tt-head { margin-bottom: 4px; }
.tt-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.tt-ent {
  font-family: var(--font-display);
  font-weight: 800; font-size: 12px;
  letter-spacing: 0.01em; color: var(--plum);
}
.tt-gse { font-size: 11px; color: var(--fg-3); margin-bottom: 6px; }
.tt-pct {
  font-family: var(--font-display);
  font-weight: 800; font-size: 20px;
  color: var(--ink); line-height: 1;
  letter-spacing: -0.01em; margin-bottom: 6px;
}
.tt-segments {
  display: flex; flex-direction: column; gap: 4px;
  padding: 6px 0; margin-bottom: 4px;
  border-bottom: 1px solid var(--border-1);
}
.tt-seg {
  display: grid; grid-template-columns: 10px 1fr auto;
  gap: 6px; align-items: center; font-size: 12px;
}
.tt-seg-sw { width: 10px; height: 10px; border-radius: 2px; }
.tt-seg-lbl { color: var(--fg-2); }
.tt-seg-val {
  font-family: var(--font-display);
  font-weight: 800; font-size: 13px;
  color: var(--ink); letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.tt-meta {
  display: flex; flex-direction: column; gap: 2px;
  font-size: 11px; color: var(--fg-2);
  padding-top: 6px; border-top: 1px solid var(--border-1);
}
.tt-meta b { font-weight: 700; color: var(--ink); }
.tt-warn {
  margin-top: 6px; padding: 4px 6px;
  background: var(--cream-200); color: var(--ink-2);
  font-size: 10px;
  border-radius: var(--radius-1);
  border-left: 2px solid var(--coral);
}
.tt-estab-link {
  display: block; width: 100%;
  margin-top: 8px; padding: 5px 8px;
  background: transparent;
  border: 1px solid var(--border-2);
  border-radius: var(--radius-1);
  color: var(--ocean); font-size: 11px; font-weight: 600;
  text-align: left; cursor: pointer;
  font-family: var(--font-body);
  transition: background 100ms ease, border-color 100ms ease;
}
.tt-estab-link:hover { background: var(--ocean-20); border-color: var(--ocean); }

/* Tabla */

  <!-- React + Babel desde CDN — builds production + SRI (auditoría B4, s13).
       Hashes sha384 calculados desde los tarballs oficiales de npm
       (identicos a lo servido por unpkg para la version fijada). Si se
       cambia la version, recalcular: openssl dgst -sha384 -binary | base64 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
          integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"

          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <!-- D3 inline -->
  <script>__D3_INLINE__</script>

  <!-- pako inline (descompresión gzip del JSON embebido) -->
  <script>__PAKO_INLINE__</script>

  <!-- Datos reales del pipeline R (gzip + base64, descomprimidos en cliente) -->
  <script>
    const DATA = JSON.parse(pako.inflate(
      Uint8Array.from(atob("__JSON_DATA__"), c => c.charCodeAt(0)),
      { to: "string" }
    ));
  </script>

  <!-- Aplicación React (JSX, compilado por Babel en el cliente) -->
  <script type="text/babel" data-presets="env,react">
    "use strict";

    // ============================================================
    // SimceData — adaptador de datos reales (reemplaza data.js)
    // ============================================================
    const SimceData = (function () {
      const M = DATA.meta;
      const D = DATA.datos;

      // Diccionarios inversos: label JSX → código JSON
      const GSE_LABEL_TO_COD = {};
      Object.entries(M.gse_labels).forEach(([cod, label]) => { GSE_LABEL_TO_COD[label] = cod; });
      // Diccionario directo: código → label
      const GSE_LABELS = M.gse_labels;
      const NIVEL_LABEL_TO_COD = {};
      Object.entries(M.niveles).forEach(([cod, label]) => { NIVEL_LABEL_TO_COD[label] = cod; });
      const PRUEBA_LABEL_TO_COD = {};
      Object.entries(M.pruebas).forEach(([cod, label]) => { PRUEBA_LABEL_TO_COD[label] = cod; });

      const YEARS = M.anios.slice().sort((a, b) => a - b);
      const GAP_YEARS = M.anios_sin_simce.slice();
      const PRELIMINAR_YEARS = M.anios_preliminar.slice();
      // GSE_LEVELS en orden: Bajo, Medio bajo, Medio, Medio alto, Alto
      const GSE_LEVELS = M.gse.map(c => M.gse_labels[c]);

      // Cache de índices por (nivel, prueba, cod_grupo)
      const CACHE_IX = new Map();
      function indicesPCG(nivel, prueba, codGrupo) {
        const k = nivel + "|" + prueba + "|" + codGrupo;
        if (!CACHE_IX.has(k)) {
          const ix = [];
          for (let i = 0; i < D.nivel.length; i++) {
            if (D.nivel[i] === nivel && D.prueba[i] === prueba && D.cod_grupo[i] === codGrupo) {
              ix.push(i);
            }
          }
          CACHE_IX.set(k, ix);
        }
        return CACHE_IX.get(k);
      }

      // REGIONES: agrupar DATA.comunas por cod_reg
      const REGIONES = (function () {
        // Usar DATA.regiones para nombre completo de región
        const nomRegPorCod = {};
        DATA.regiones.forEach(r => { nomRegPorCod[r.cod] = r.nom; });
        const byReg = new Map();
        DATA.comunas.forEach(c => {
          if (!byReg.has(c.cod_reg)) {
            byReg.set(c.cod_reg, {
              nombre: nomRegPorCod[c.cod_reg] || c.nom_reg || ("Región " + c.cod_reg),
              cod_reg: c.cod_reg,
              comunas: [],
            });
          }
          byReg.get(c.cod_reg).comunas.push({
            cod_com: c.cod,
            nombre: c.nom,
          });
        });
        return Array.from(byReg.values())
          .sort((a, b) => parseInt(a.cod_reg) - parseInt(b.cod_reg))
          .map(r => ({
            ...r,
            comunas: r.comunas.sort((a, b) => a.nombre.localeCompare(b.nombre, "es")),
          }));
      })();

      // Look up de comuna por código
      const COMUNA_BY_COD = new Map(DATA.comunas.map(c => [c.cod, c]));

      // Catálogo de SLEPs desde meta
      const SLEPS = (function() {
        if (!DATA.sleps) return [];
        // Agrupar por cod_slep
        const bySlep = new Map();
        DATA.sleps.forEach(r => {
          if (!bySlep.has(r.cod_slep)) {
            bySlep.set(r.cod_slep, {
              cod_slep: r.cod_slep,
              nombre: r.nombre_slep,
              anio_traspaso: r.anio_traspaso,
              rbds: [],
              comunas: [],
            });
          }
          const s = bySlep.get(r.cod_slep);
          s.rbds.push(r.rbd);
          if (!s.comunas.includes(r.cod_com_rbd)) s.comunas.push(r.cod_com_rbd);
        });
        return Array.from(bySlep.values())
          .sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
      })();

      // Catálogo de dependencias. El label de SLEP se normaliza al nombre oficial
      // "Servicio Local de Educación Pública (SLEP)" independientemente de cómo lo
      // traiga el JSON (las bases lo definen como "Servicio Local de Educación").
      const DEPE2_LABELS = {
        "1": "Municipal", "2": "Part. Subvencionado", "3": "Part. Pagado",
        "4": "Corp. Admin. Delegada", "5": "Servicio Local de Educación Pública (SLEP)",
        ...(M.depe2_labels || {}),
        "5": "Servicio Local de Educación Pública (SLEP)",
      };
      const DEPE2_CODES = M.depe2 || ["1", "2", "3", "4", "5"];

      // Construye un punto de serie desde un acumulador {num,num_ele,num_ins,den,n_estab}.
      // Normaliza los tres niveles a 100 para el apilado: Adecuado se conserva
      // exacto (no cambia respecto al modo solo-Adecuado); Elem e Insuf se ajustan
      // proporcionalmente para absorber el ±0.1 de redondeo de la fuente, de modo
      // que ningún gráfico apilado sume 99.9 ni 100.1.
      function mkPunto(year, acc, preliminar) {
        const pct = Math.round((acc.num / acc.den) * 1000) / 10;
        let pe = acc.num_ele > 0 ? (acc.num_ele / acc.den) * 100 : 0;
        let pi = acc.num_ins > 0 ? (acc.num_ins / acc.den) * 100 : 0;
        const resto = Math.max(0, 100 - pct);   // lo que no es Adecuado
        const sumaEI = pe + pi;
        if (sumaEI > 0) {
          // Reescalar Elem+Insuf para que sumen exactamente (100 − Adecuado).
          pe = Math.round((pe / sumaEI) * resto * 10) / 10;
          pi = Math.round((resto - pe) * 10) / 10;
        } else {
          pe = 0; pi = Math.round(resto * 10) / 10;
        }
        return { year, pct, pct_ele: pe, pct_ins: pi, n_eval: acc.den, n_estab: acc.n_estab, preliminar };
      }

      // generateSeries por lista de RBDs: agrega ponderado por nalu sobre los
      // establecimientos exactos del SLEP (entity.rbds), leyendo de DATA.simce_rbd
      // (datos por establecimiento). Es la fuente de verdad: no depende de
      // comuna+depe2, por lo que funciona igual para SLEP ya traspasados (RBDs
      // depe 5) y prospectivos (RBDs aún municipales). Misma lista que usan el
      // popup y los conteos de establecimientos.
      function generateSeriesByRbd({ rbds, gse, nivel, prueba }) {
        const cg = GSE_LABEL_TO_COD[gse];
        const nv = NIVEL_LABEL_TO_COD[nivel];
        const pr = PRUEBA_LABEL_TO_COD[prueba];
        const vacia = () => YEARS.map(y => ({ year: y, pct: null, n_eval: null, n_estab: null, preliminar: PRELIMINAR_YEARS.includes(y) }));
        if (!cg || !nv || !pr || !DATA.simce_rbd) return vacia();
        const setRbd = new Set((rbds || []).map(String));
        const D2 = DATA.simce_rbd;
        const porAnio = new Map();
        for (let i = 0; i < D2.rows; i++) {
          if (D2.nivel[i] !== nv) continue;
          if (D2.prueba[i] !== pr) continue;
          if (String(D2.cod_grupo[i]) !== cg) continue;
          if (!setRbd.has(String(D2.rbd[i]))) continue;
          const n = D2.nalu[i];
          const p = D2.palu[i];
          if (n == null || n === 0 || p == null) continue;
          const pe = D2.palu_ele[i], pi = D2.palu_ins[i];
          const y = D2.anio[i];
          let acc = porAnio.get(y);
          if (!acc) { acc = { num: 0, num_ele: 0, num_ins: 0, den: 0, n_estab: 0 }; porAnio.set(y, acc); }
          acc.num += (p * n) / 100;
          if (pe != null) acc.num_ele += (pe * n) / 100;
          if (pi != null) acc.num_ins += (pi * n) / 100;
          acc.den += n;
          acc.n_estab += 1;
        }
        return YEARS.map(year => {
          const acc = porAnio.get(year);
          const preliminar = PRELIMINAR_YEARS.includes(year);
          if (acc && acc.den > 0) return mkPunto(year, acc, preliminar);
          return { year, pct: null, pct_ele: null, pct_ins: null, n_eval: null, n_estab: null, preliminar };
        });
      }

      // generateSeries por comunas + depe2
      function generateSeriesByDepe({ comunas, depe2, gse, nivel, prueba }) {
        const cg = GSE_LABEL_TO_COD[gse];
        const nv = NIVEL_LABEL_TO_COD[nivel];
        const pr = PRUEBA_LABEL_TO_COD[prueba];
        if (!cg || !nv || !pr) return YEARS.map(y => ({ year: y, pct: null, n_eval: null, n_estab: null, preliminar: PRELIMINAR_YEARS.includes(y) }));
        const ix = indicesPCG(nv, pr, cg);
        const setCom = new Set(comunas || []);
        const porAnio = new Map();
        for (const i of ix) {
          if (!setCom.has(D.cod_com[i])) continue;
          if (depe2 && D.cod_depe2 && D.cod_depe2[i] !== depe2) continue;
          const y = D.anio[i];
          const p = D.pct[i], n = D.n_evaluados[i], e = D.n_estab[i];
          if (p == null || n == null || n === 0) continue;
          const pe = D.pct_ele[i], pi = D.pct_ins[i];
          let acc = porAnio.get(y);
          if (!acc) { acc = { num: 0, num_ele: 0, num_ins: 0, den: 0, n_estab: 0 }; porAnio.set(y, acc); }
          acc.num += (p * n) / 100;
          if (pe != null) acc.num_ele += (pe * n) / 100;
          if (pi != null) acc.num_ins += (pi * n) / 100;
          acc.den += n;
          acc.n_estab += e;
        }
        return YEARS.map(year => {
          const acc = porAnio.get(year);
          const preliminar = PRELIMINAR_YEARS.includes(year);
          if (acc && acc.den > 0) return mkPunto(year, acc, preliminar);
          return { year, pct: null, pct_ele: null, pct_ins: null, n_eval: null, n_estab: null, preliminar };
        });
      }

      // generateSeries por establecimiento (RBD único)
      // Fuente: DATA.simce_rbd (formato columnar: rbd, nivel, prueba, cod_grupo, anio, nalu, palu, cod_depe2)
      // gse aquí es el GSE del establecimiento en el año más reciente — se ignora como filtro
      // porque un RBD pertenece a un solo GSE por año; mostramos todos los años disponibles.
      function generateSeriesByEstab({ rbd, gse, nivel, prueba }) {
        const nv = NIVEL_LABEL_TO_COD[nivel];
        const pr = PRUEBA_LABEL_TO_COD[prueba];
        if (!nv || !pr || !DATA.simce_rbd) {
          return YEARS.map(y => ({ year: y, pct: null, n_eval: null, n_estab: 1, preliminar: PRELIMINAR_YEARS.includes(y) }));
        }
        const D2 = DATA.simce_rbd;
        const porAnio = new Map();
        for (let i = 0; i < D2.rows; i++) {
          if (D2.rbd[i] !== rbd) continue;
          if (D2.nivel[i] !== nv) continue;
          if (D2.prueba[i] !== pr) continue;
          const y = D2.anio[i];
          const n = D2.nalu[i];
          const p = D2.palu[i];
          if (n == null || n === 0 || p == null) continue;
          const pe = D2.palu_ele[i], pi = D2.palu_ins[i];
          let acc = porAnio.get(y);
          if (!acc) { acc = { num: 0, num_ele: 0, num_ins: 0, den: 0, n_estab: 1 }; porAnio.set(y, acc); }
          acc.num += (p * n) / 100;
          if (pe != null) acc.num_ele += (pe * n) / 100;
          if (pi != null) acc.num_ins += (pi * n) / 100;
          acc.den += n;
        }
        return YEARS.map(year => {
          const acc = porAnio.get(year);
          const preliminar = PRELIMINAR_YEARS.includes(year);
          if (acc && acc.den > 0) { const pt = mkPunto(year, acc, preliminar); pt.n_estab = 1; return pt; }
          return { year, pct: null, pct_ele: null, pct_ins: null, n_eval: null, n_estab: null, preliminar };
        });
      }

      // generateSeries nacional — agrega todos los establecimientos del país
      // sin filtro de comunas. Misma fuente y lógica que generateSeriesByDepe.
      function generateSeriesByNacional({ gse, nivel, prueba, depe2 }) {
        const cg = GSE_LABEL_TO_COD[gse];
        const nv = NIVEL_LABEL_TO_COD[nivel];
        const pr = PRUEBA_LABEL_TO_COD[prueba];
        if (!cg || !nv || !pr) return YEARS.map(y => ({ year: y, pct: null, n_eval: null, n_estab: null, preliminar: PRELIMINAR_YEARS.includes(y) }));
        const ix = indicesPCG(nv, pr, cg);
        const porAnio = new Map();
        for (const i of ix) {
          if (depe2 && D.cod_depe2 && D.cod_depe2[i] !== depe2) continue;
          const y = D.anio[i];
          const p = D.pct[i], n = D.n_evaluados[i], e = D.n_estab[i];
          if (p == null || n == null || n === 0) continue;
          const pe = D.pct_ele[i], pi = D.pct_ins[i];
          let acc = porAnio.get(y);
          if (!acc) { acc = { num: 0, num_ele: 0, num_ins: 0, den: 0, n_estab: 0 }; porAnio.set(y, acc); }
          acc.num += (p * n) / 100;
          if (pe != null) acc.num_ele += (pe * n) / 100;
          if (pi != null) acc.num_ins += (pi * n) / 100;
          acc.den += n;
          acc.n_estab += e;
        }
        return YEARS.map(year => {
          const acc = porAnio.get(year);
          const preliminar = PRELIMINAR_YEARS.includes(year);
          if (acc && acc.den > 0) return mkPunto(year, acc, preliminar);
          return { year, pct: null, pct_ele: null, pct_ins: null, n_eval: null, n_estab: null, preliminar };
        });
      }

      // GSE del establecimiento por año más reciente (para mostrar en qué fila aparece)
      // Devuelve el cod_grupo del año más reciente con dato para ese RBD × nivel × prueba
      function gseActualDeEstab({ rbd, nivel, prueba }) {
        const nv = NIVEL_LABEL_TO_COD[nivel];
        const pr = PRUEBA_LABEL_TO_COD[prueba];
        if (!nv || !pr || !DATA.simce_rbd) return GSE_LEVELS[0];
        const D2 = DATA.simce_rbd;
        let maxAnio = -1, gse = GSE_LEVELS[0];
        for (let i = 0; i < D2.rows; i++) {
          if (D2.rbd[i] !== rbd || D2.nivel[i] !== nv || D2.prueba[i] !== pr) continue;
          if (D2.anio[i] > maxAnio) { maxAnio = D2.anio[i]; gse = D2.cod_grupo[i]; }
        }
        return gse;
      }

      // Catálogo de establecimientos para búsqueda en modal (nombre + rbd + comuna)
      const ESTAB_LIST = DATA.establecimientos
        ? DATA.establecimientos.map(r => ({
            rbd: r.rbd,
            nom: r.nom_rbd,
            com: r.nom_com_rbd,
            cod_com: r.cod_com_rbd,
            depe2: r.cod_depe2,
          }))
        : [];

      // Función canónica de selección de series — único lugar donde vive esta lógica.
      // Usar en lugar de los ternarios inline en ChartCell, SparklineSubchart,
      // RecentBarsSubchart, ResultsTable y exportarCSV.
      function getSeriesForEntity(entity, gse, nivel, prueba) {
        if (entity.kind === "slep") {
          return generateSeriesByRbd({ rbds: entity.rbds, gse, nivel, prueba });
        }
        if (entity.kind === "estab") {
          return generateSeriesByEstab({ rbd: entity.rbd, gse, nivel, prueba });
        }
        if (entity.kind === "nacional") {
          return generateSeriesByNacional({ gse, nivel, prueba, depe2: entity.depe2 });
        }
        return generateSeriesByDepe({ comunas: entity.comunas, depe2: entity.depe2, gse, nivel, prueba });
      }

      // Último año con datos SIMCE. Un SLEP cuyo anio_traspaso es posterior
      // administra sus establecimientos desde un año sin datos aún: sus
      // resultados corresponden íntegramente a la administración previa
      // (municipal). Se marca en la UI.
      const ANIO_DATOS_MAX = YEARS.length ? Math.max.apply(null, YEARS) : null;
      function slepEsProspectivo(anioTraspaso) {
        return anioTraspaso != null && ANIO_DATOS_MAX != null
          && anioTraspaso > ANIO_DATOS_MAX;
      }

      // Año de corte para segmentar visualmente la serie de un SLEP en gestión
      // municipal previa (años < traspaso) vs gestión SLEP (años >= traspaso).
      // Regla única: solo aplica a entidades kind="slep" YA traspasadas, es
      // decir, con anio_traspaso dentro del rango con datos (<= ANIO_DATOS_MAX).
      // Devuelve el año de traspaso, o null si no corresponde dibujar corte:
      //   - SLEP prospectivo (traspaso > último dato): no hay tramo "post" que
      //     diferenciar; ya tiene badge/disclaimer propios.
      //   - comuna/región/nacional filtrada por depe2=5: mezcla SLEP con años
      //     de traspaso distintos, no hay un corte único; conservan el
      //     disclaimer textual.
      function anioCorteTraspaso(entity) {
        if (!entity || entity.kind !== "slep") return null;
        const at = entity.anio_traspaso;
        if (at == null) return null;
        if (ANIO_DATOS_MAX != null && at > ANIO_DATOS_MAX) return null;
        return at;
      }

      // Una entidad depende de la clasificación SLEP (dependencia actual aplicada
      // a toda la serie) cuando es un SLEP, o cuando filtra por dependencia
      // "Servicio Local de Educación" (cod 5) en comuna/región/nacional.
      function entidadDependeSlep(entity) {
        if (!entity) return false;
        return entity.kind === "slep" || String(entity.depe2) === "5";
      }

      return {
        YEARS, GAP_YEARS, PRELIMINAR_YEARS, GSE_LEVELS,
        ANIO_DATOS_MAX, slepEsProspectivo, entidadDependeSlep, anioCorteTraspaso,
        generateSeriesByRbd, generateSeriesByDepe,
        generateSeriesByEstab, generateSeriesByNacional, gseActualDeEstab, ESTAB_LIST,
        getSeriesForEntity,
        REGIONES, COMUNA_BY_COD,
        SLEPS, DEPE2_LABELS, DEPE2_CODES,
        NIVEL_LABEL_TO_COD, PRUEBA_LABEL_TO_COD,
        GSE_LABELS, GSE_LABEL_TO_COD,
      };
    })();

    // ============================================================
    // Utilidades de formato chileno
    // ============================================================
    function fmtPct(v) {
      if (v == null) return "—";
      return v.toFixed(1).replace(".", ",") + "%";
    }
    function fmtPctShort(v) {
      if (v == null) return "—";
      return Math.round(v) + "%";
    }
    function fmtInt(v) {
      if (v == null) return "—";
      return v.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    // ============================================================
    // Paleta de entidades
    // ============================================================
    const ENTITY_PALETTE = [
      "#0A3A5C", "#C45A3E", "#1F4A1F", "#8A5A8E",
      "#B89530", "#4A6FA5", "#A35A6F", "#5C8A6E",
    ];
    const MAX_ENTIDADES = 4;
    // Colores fijos para los segmentos Elemental e Insuficiente (modo apilado).
    // Tonos neutros, deliberadamente distintos de ENTITY_PALETTE para no
    // confundirse con el color de la entidad (que representa Adecuado).
    // Colores fijos por NIVEL (no por entidad): un mismo nivel se ve igual
    // en todas las entidades. La identidad de cada entidad se distingue por
    // su nombre, su swatch en la tarjeta y el borde inferior del gráfico.
    const COLOR_ADEC  = "#0C4682";  // azul (Adecuado)
    const COLOR_ELEM  = "#6BA0CE";  // azul claro (Elemental)
    const COLOR_INSUF = "#79204F";  // vino (Insuficiente)

    // ============================================================
    // Header — banner azul institucional
    // ============================================================
    function Header() {

        <header className="app-header">

              </p>

    function Segmented({ value, options, onChange }) {
      const opts = options.map(o => typeof o === "string" ? { value: o, label: o } : o);
      return (
        <div className="segmented" role="tablist">
          {opts.map(o => (
            <button
              key={o.value}
              role="tab"
              aria-selected={value === o.value}
              className={"segmented-btn" + (value === o.value ? " is-active" : "")}
              onClick={() => onChange(o.value)}
            >{o.label}</button>
          ))}
        </div>
      );
    }

    function ControlsBar({ nivel, setNivel, prueba, setPrueba, loading }) {
      const niveles = Object.entries(DATA.meta.niveles)
        .sort(([a], [b]) => a === "4b" ? -1 : 1)
        .map(([,v]) => v);
      const pruebas = Object.values(DATA.meta.pruebas);
      return (
        <section className="controls-bar">
          <div className="control-group">
            <span className="control-label">Nivel</span>
            <Segmented value={nivel} options={niveles} onChange={setNivel} />
          </div>
          <div className="control-group">
            <span className="control-label">Prueba</span>
            <Segmented value={prueba} options={pruebas} onChange={setPrueba} />
          </div>
          <div className="controls-spacer" />
          {loading && (
            <div className="loading-pill">
              <span className="loading-dot" />
              <span>Recalculando…</span>
            </div>
          )}
        </section>
      );
    }

    function contarEstablecimientos(entity, nivel, prueba) {
      if (!DATA.establecimientos || !entity.comunas || entity.comunas.length === 0) return null;
      const nv = SimceData.NIVEL_LABEL_TO_COD[nivel];
      const pr = SimceData.PRUEBA_LABEL_TO_COD[prueba];
      const rbdsNP = new Set();
      if (DATA.rbds_por_nivel) {
        DATA.rbds_por_nivel
          .filter(r => r.nivel === nv && r.prueba === pr)
          .forEach(r => rbdsNP.add(String(r.rbd)));
      }
      const setCom = new Set(entity.comunas);
      const rbdsSlep = entity.kind === "slep" ? new Set((entity.rbds || []).map(String)) : null;
      return DATA.establecimientos.filter(r => {
        if (entity.kind === "slep") {
          if (!rbdsSlep.has(String(r.rbd))) return false;
        } else {
          if (!setCom.has(String(r.cod_com_rbd))) return false;
          if (entity.depe2) { if (String(r.cod_depe2) !== String(entity.depe2)) return false; }
        }
        return rbdsNP.has(String(r.rbd));
      }).length;
    }

    function EntityChip({ entity, onRemove, onEdit, onShowEstab, nivel, prueba }) {
      const nEstabSlep = entity.kind === "slep" && DATA.establecimientos
        ? (function() {
            const rbdsSlep = new Set((entity.rbds || []).map(String));
            return DATA.establecimientos.filter(r => rbdsSlep.has(String(r.rbd))).length;
          })()
        : null;
      const meta = entity.kind === "slep"
        ? `SLEP · ${entity.comunas.length} comunas · ${nEstabSlep !== null ? nEstabSlep : "…"} establecimientos`
        : entity.kind === "nacional"
        ? `Nacional · ${entity.depe2 ? SimceData.DEPE2_LABELS[entity.depe2] : "Todas las dependencias"}`
        : entity.kind === "group"
        ? `Grupo · ${entity.comunas.length} comunas`
        : entity.depe2 ? SimceData.DEPE2_LABELS[entity.depe2] : "Comuna";
      const hasEstabs = entity.comunas && entity.comunas.length > 0;
      return (
        <div className="entity-chip">
          <span className="entity-swatch" style={{ background: entity.color }} />
          <span className="entity-text">
            <span className="entity-name">{entity.name}</span>
            <span className="entity-meta">{meta}</span>
            {SimceData.entidadDependeSlep(entity) && (
              <span className="entity-slep-note" title="Clasificación por dependencia actual: incluye años previos al traspaso (gestión municipal). Las cifras anteriores al traspaso no son atribuibles al SLEP.">
                <Icon name="info" />
                Incluye periodo de gestión municipal previo al traspaso
              </span>
            )}
            {hasEstabs && (
              <button className="entity-estab-btn" onClick={onShowEstab}>
                {`ver establecimientos (${contarEstablecimientos(entity, nivel, prueba) ?? "…"}) ▸`}
              </button>
            )}
          </span>
          <button className="entity-btn" onClick={onEdit} title="Editar"><Icon name="edit" /></button>
          <button className="entity-btn entity-btn-remove" onClick={onRemove} title="Eliminar"><Icon name="x" /></button>
        </div>
      );
    }

    function EntitiesBar({ entities, setEntities, openModal, onReset, onShowEstab, nivel, prueba }) {
      function removeEntity(id) { setEntities(entities.filter(e => e.id !== id)); }
      return (
        <section className="entities-bar">
          <div className="entities-head">
            <h2 className="section-eyebrow">Entidades a comparar</h2>
            <span className="entities-count">{entities.length} de {MAX_ENTIDADES} activas</span>
          </div>
          <div className="entities-list">
            {entities.map(e => (
              <EntityChip
                key={e.id}
                entity={e}
                onRemove={() => removeEntity(e.id)}
                onEdit={() => openModal(e)}
                onShowEstab={(ev) => onShowEstab(e, ev)}
                nivel={nivel}
                prueba={prueba}
              />
            ))}
            {entities.length < MAX_ENTIDADES && (
              <div className="entities-actions">
                <button className="btn btn-primary" onClick={() => openModal(null)}>
                  <Icon name="plus" /> Agregar entidad
                </button>
              </div>
            )}
            <button className="btn btn-ghost btn-icon-only entities-reset" onClick={onReset}
              title="Restablecer entidades iniciales" aria-label="Restablecer entidades iniciales">
              <Icon name="rotate-ccw" />
            </button>
          </div>
        </section>
      );
    }



    // ============================================================
    // Tooltip compartido
    // ============================================================
    // Estado global del tooltip: el tooltip es un singleton en el DOM.
    // isPinned = true cuando el usuario hizo clic en un punto; en ese
    // estado no se oculta con mouseleave y muestra el botón de establecimientos.
    const _tt = { pinned: false };

    function makeTooltip(entity, gse, nivel, prueba) {
      function populate(tip, s, yr, pinned) {
        tip.innerHTML = `
          <div class="tt-row tt-head">
            <span class="tt-swatch" style="background:${COLOR_ADEC}"></span>
            <span class="tt-ent"></span>
          </div>
          <div class="tt-gse"></div>
          <div class="tt-segments">
            <div class="tt-seg">
              <span class="tt-seg-sw" style="background:${COLOR_ADEC}"></span>
              <span class="tt-seg-lbl">Adecuado</span>
              <span class="tt-seg-val tt-adec"></span>
            </div>
            <div class="tt-seg">
              <span class="tt-seg-sw" style="background:${COLOR_ELEM}"></span>
              <span class="tt-seg-lbl">Elemental</span>
              <span class="tt-seg-val tt-ele"></span>
            </div>
            <div class="tt-seg">
              <span class="tt-seg-sw" style="background:${COLOR_INSUF}"></span>
              <span class="tt-seg-lbl">Insuficiente</span>
              <span class="tt-seg-val tt-ins"></span>
            </div>
          </div>
          <div class="tt-meta">
            <span>N evaluados: <b class="tt-n-eval"></b></span>
            <span>N establecimientos: <b class="tt-n-estab"></b></span>
          </div>
        `;
        tip.querySelector(".tt-ent").textContent = entity.name;
        tip.querySelector(".tt-gse").textContent = "GSE " + gse + " · " + yr + (s.preliminar ? " *" : "");
        tip.querySelector(".tt-adec").textContent = fmtPct(s.pct);
        tip.querySelector(".tt-ele").textContent = (s.pct == null) ? "—"
          : (s.pct_ele != null ? fmtPct(s.pct_ele) : "—");
        tip.querySelector(".tt-ins").textContent = (s.pct == null) ? "—"
          : (s.pct_ins != null ? fmtPct(s.pct_ins) : "—");
        tip.querySelector(".tt-n-eval").textContent = fmtInt(s.n_eval);
        tip.querySelector(".tt-n-estab").textContent = fmtInt(s.n_estab);

        if (s.n_estab === 1) {
          const warn = document.createElement("div");
          warn.className = "tt-warn";
          let warnText = "Baja representatividad — un solo establecimiento";
          if (DATA.establecimientos && DATA.rbds_por_nivel && nivel && prueba) {
            const nv = SimceData.NIVEL_LABEL_TO_COD[nivel];
            const pr = SimceData.PRUEBA_LABEL_TO_COD[prueba];
            const rbdsNP = new Set(
              DATA.rbds_por_nivel.filter(r => r.nivel === nv && r.prueba === pr).map(r => String(r.rbd))
            );
            const setCom = new Set(entity.comunas || []);
            const rbdsSlep = entity.kind === "slep" ? new Set((entity.rbds || []).map(String)) : null;
            const candidatos = DATA.establecimientos.filter(r => {
              if (entity.kind === "slep") {
                if (!rbdsSlep.has(String(r.rbd))) return false;
              } else {
                if (!setCom.has(String(r.cod_com_rbd))) return false;
                if (entity.depe2) { if (String(r.cod_depe2) !== String(entity.depe2)) return false; }
              }
              return rbdsNP.has(String(r.rbd));
            });
            if (candidatos.length === 1) {
              warnText = `Baja representatividad — un solo establecimiento (RBD ${candidatos[0].rbd})`;
            }
          }
          warn.textContent = warnText;
          tip.appendChild(warn);
        }
        if (s.preliminar) {
          const warn = document.createElement("div");
          warn.className = "tt-warn";
          warn.textContent = "* Dato preliminar 2025";
          tip.appendChild(warn);
        }

        // Botón "Ver establecimientos" — solo en estado pinned
        if (pinned && s.n_estab != null && s.n_estab > 0) {
          const btn = document.createElement("button");
          btn.className = "tt-estab-link";
          btn.textContent = `Ver establecimientos (${fmtInt(s.n_estab)}) ▸`;
          btn.addEventListener("click", (ev) => {
            const tipRect = tip.getBoundingClientRect();
            _tt.pinned = false;
            tip.classList.remove("is-pinned");
            tip.style.display = "none";
            const overlay = document.getElementById("tooltip-overlay");
            overlay.style.display = "none";
            overlay.onclick = null;
            if (typeof window.__openChartEstabPopup === "function") {
              window.__openChartEstabPopup({
                entity, gse, nivel, prueba, year: yr,
                clientX: tipRect.left + tipRect.width / 2,
                clientY: tipRect.top,
              });
            }
          });
          tip.appendChild(btn);
        }
      }

      function show(e, s, yr, svgEl) {
        // Si hay otro tooltip pinned de otra entidad/punto, no lo sobreescribir con hover
        if (_tt.pinned) return;
        const tip = document.getElementById("global-tooltip");
        tip.classList.remove("is-pinned");

        // Posición anclada al punto del SVG (no sigue al cursor)
        const svgRect = svgEl.getBoundingClientRect();
        const ptX = svgRect.left + (e.offsetX !== undefined ? e.offsetX : e.layerX);
        const ptY = svgRect.top  + (e.offsetY !== undefined ? e.offsetY : e.layerY);
        tip.style.display = "block";
        tip.style.left = (ptX + window.scrollX + 14) + "px";
        tip.style.top  = (ptY + window.scrollY - 14) + "px";

        populate(tip, s, yr, false);
      }

      function pin(e, s, yr, svgEl) {
        _tt.pinned = true;
        const tip = document.getElementById("global-tooltip");
        const overlay = document.getElementById("tooltip-overlay");
        tip.classList.add("is-pinned");

        const svgRect = svgEl.getBoundingClientRect();
        const ptX = svgRect.left + (e.offsetX !== undefined ? e.offsetX : e.layerX);
        const ptY = svgRect.top  + (e.offsetY !== undefined ? e.offsetY : e.layerY);
        tip.style.display = "block";
        tip.style.left = (ptX + window.scrollX + 14) + "px";
        tip.style.top  = (ptY + window.scrollY - 14) + "px";

        // Overlay: clic fuera cierra el tooltip
        overlay.style.display = "block";
        overlay.onclick = () => {
          _tt.pinned = false;
          tip.classList.remove("is-pinned");
          tip.style.display = "none";
          overlay.style.display = "none";
          overlay.onclick = null;
        };

        populate(tip, s, yr, true);
      }

      function hide() {
        if (_tt.pinned) return; // no ocultar si está pinned
        document.getElementById("global-tooltip").style.display = "none";
      }
      return { show, hide, pin };
    }

    // ============================================================
    // Sparkline — trayectoria histórica
    // ============================================================
    function SparklineSubchart({ entity, gse, nivel, prueba }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const svg = d3.select(ref.current);
        svg.selectAll("*").remove();
        const W = 320, H = 90;
        const M = { top: 28, right: 12, bottom: 22, left: 12 };
        const iw = W - M.left - M.right;
        const ih = H - M.top - M.bottom;
        const g = svg
          .attr("viewBox", `0 0 ${W} ${H}`)
          .attr("preserveAspectRatio", "xMidYMid meet")
          .append("g")
          .attr("transform", `translate(${M.left},${M.top})`);

        const series = SimceData.getSeriesForEntity(entity, gse, nivel, prueba);
        const valid = series.filter(s => s.pct != null);
        const x = d3.scaleLinear().domain([2014, 2025]).range([0, iw]);
        const y = d3.scaleLinear().domain([0, 100]).range([ih, 0]);

        // Banda 2019-2021
        const gap = SimceData.GAP_YEARS;
        if (gap.length > 0) {
          g.append("rect")
            .attr("x", x(Math.min(...gap))).attr("y", 0)
            .attr("width", x(Math.max(...gap)) - x(Math.min(...gap))).attr("height", ih)
            .attr("fill", "#0A3A5C").attr("opacity", 0.03);
        }

        const lineGen = d3.line()
          .defined(d => d.pct != null)
          .x(d => x(d.year)).y(d => y(d.pct))
          .curve(d3.curveMonotoneX);

        // Corte por año de traspaso del SLEP (null salvo SLEP ya traspasado).
        // El tramo previo al traspaso (gestión municipal, no atribuible al SLEP)
        // se atenúa; el posterior va a opacidad plena. Independiente del corte
        // del gap 2019-2021: aquí solo modula opacidad y estilo de trazo.
        const anioCorte = SimceData.anioCorteTraspaso(entity);
        const esPrevio = year => anioCorte != null && year < anioCorte;
        const OP_PREVIO = 0.4;

        // Marcador vertical en el año de traspaso.
        if (anioCorte != null) {
          const xc = x(anioCorte);
          g.append("line")
            .attr("x1", xc).attr("x2", xc)
            .attr("y1", 0).attr("y2", ih)
            .attr("stroke", "#0A3A5C")
            .attr("stroke-width", 1)
            .attr("stroke-dasharray", "2,2")
            .attr("opacity", 0.55);
          g.append("text")
            .attr("x", xc).attr("y", -2)
            .attr("text-anchor", "middle")
            .attr("font-family", "system-ui, sans-serif")
            .attr("font-size", 8)
            .attr("font-weight", 700)
            .attr("fill", "#0A3A5C")
            .attr("opacity", 0.7)
            .text("traspaso");
        }

        // Tramos del gap 2019-2021. Cuando hay corte de traspaso, se subdivide
        // cada tramo en sub-segmentos previo/post para aplicar el estilo
        // diferenciado sin alterar la continuidad visual.
        const pre = series.filter(s => s.year <= 2018);
        const post = series.filter(s => s.year >= 2022);
        function dibujarSegmento(seg) {
          const v = seg.filter(s => s.pct != null);
          if (v.length < 2) return;
          if (anioCorte == null) {
            g.append("path")
              .attr("d", lineGen(seg))
              .attr("fill", "none")
              .attr("stroke", COLOR_ADEC)
              .attr("stroke-width", 1.5)
              .attr("stroke-linejoin", "round")
              .attr("stroke-linecap", "round");
            return;
          }
          // Subtramos: previo (year < corte) y post (year >= corte). Para que la
          // línea no se interrumpa en el corte, el subtramo previo incluye el
          // primer punto post como nodo de cierre.
          const previo = seg.filter(s => s.year < anioCorte);
          const postC = seg.filter(s => s.year >= anioCorte);
          const previoEnlazado = postC.length > 0 ? previo.concat([postC[0]]) : previo;
          if (previo.filter(s => s.pct != null).length >= 1 && previoEnlazado.filter(s => s.pct != null).length >= 2) {
            g.append("path")
              .attr("d", lineGen(previoEnlazado))
              .attr("fill", "none")
              .attr("stroke", COLOR_ADEC)
              .attr("stroke-width", 1.5)
              .attr("stroke-dasharray", "3,2")
              .attr("opacity", OP_PREVIO)
              .attr("stroke-linejoin", "round")
              .attr("stroke-linecap", "round");
          }
          if (postC.filter(s => s.pct != null).length >= 2) {
            g.append("path")
              .attr("d", lineGen(postC))
              .attr("fill", "none")
              .attr("stroke", COLOR_ADEC)
              .attr("stroke-width", 1.5)
              .attr("stroke-linejoin", "round")
              .attr("stroke-linecap", "round");
          }
        }
        [pre, post].forEach(dibujarSegmento);

        const tt = makeTooltip(entity, gse, nivel, prueba);
        valid.forEach(s => {
          const cx = x(s.year);
          const cy = y(s.pct);
          const isLowN = s.n_estab === 1;
          const opPrevio = esPrevio(s.year) ? OP_PREVIO : 1;
          const opacity = (isLowN ? 0.45 : 1) * opPrevio;
          g.append("circle")
            .attr("cx", cx).attr("cy", cy)
            .attr("r", 2.6)
            .attr("fill", COLOR_ADEC)
            .attr("opacity", opacity)
            .style("cursor", "pointer")
            .on("mouseenter", e => tt.show(e, s, s.year, ref.current))
            .on("mouseleave", tt.hide)
            .on("click", e => { e.stopPropagation(); tt.pin(e, s, s.year, ref.current); });
          const labelY = Math.max(8, cy - 6);
          g.append("text")
            .attr("x", cx).attr("y", labelY)
            .attr("text-anchor", "middle")
            .attr("font-family", "system-ui, sans-serif")
            .attr("font-size", 10.5)
            .attr("font-weight", 600)
            .attr("fill", COLOR_ADEC)
            .attr("opacity", opacity * 0.9)
            .style("pointer-events", "none")
            .text(Math.round(s.pct) + "%");
          g.append("text")
            .attr("x", cx).attr("y", ih + 13)
            .attr("text-anchor", "middle")
            .attr("font-family", "system-ui, sans-serif")
            .attr("font-size", 9.5)
            .attr("fill", "#747474")
            .text(s.year);
          if (s.preliminar) {
            g.append("text")
              .attr("x", cx + 7).attr("y", labelY - 1)
              .attr("font-family", "system-ui, sans-serif")
              .attr("font-size", 10.5)
              .attr("font-weight", 900)
              .attr("fill", "#0062A0")
              .text("*");
          }
        });
      }, [entity.id, entity.name, entity.anio_traspaso, entity.kind, (entity.comunas || []).join(","), gse, nivel, prueba]);
      return <svg ref={ref} className="sparkline-svg" />;
    }

    // ============================================================
    // Bar chart — últimas 3 aplicaciones
    // ============================================================
    function RecentBarsSubchart({ entity, gse, nivel, prueba, showElemInsuf, yScale, recentN = 3 }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const svg = d3.select(ref.current);
        svg.selectAll("*").remove();
        const W = 320, H = 165;
        const M = { top: 28, right: 10, bottom: 24, left: 28 };
        const iw = W - M.left - M.right;
        const ih = H - M.top - M.bottom;
        const g = svg
          .attr("viewBox", `0 0 ${W} ${H}`)
          .attr("preserveAspectRatio", "xMidYMid meet")
          .append("g")
          .attr("transform", `translate(${M.left},${M.top})`);

        const series = SimceData.getSeriesForEntity(entity, gse, nivel, prueba);
        const recent = series.filter(s => s.pct != null).slice(-recentN);

        let yMax = 100;
        if (yScale === "auto" && !showElemInsuf) {
          const peak = d3.max(recent, d => d.pct) || 0;
          yMax = Math.min(100, Math.max(20, Math.ceil((peak + 8) / 10) * 10));
        }
        const y = d3.scaleLinear().domain([0, yMax]).range([ih, 0]);
        const yTicks = [0, 25, 50, 75, 100].filter(v => v <= yMax);
        if (yMax !== 100 && !yTicks.includes(yMax)) yTicks.push(yMax);
        g.append("g")
          .selectAll("line")
          .data(yTicks)
          .join("line")
          .attr("x1", 0).attr("x2", iw)
          .attr("y1", d => y(d)).attr("y2", d => y(d))
          .attr("stroke", "#E7DFC9")
          .attr("stroke-dasharray", d => d === 0 ? "0" : "2,3")
          .attr("stroke-width", 1);

        g.append("g")
          .call(
            d3.axisLeft(y)
              .tickValues(yTicks)
              .tickFormat(d => d + "%")
              .tickSize(0)
              .tickPadding(6)
          )
          .call(s => s.select(".domain").remove())
          .call(s => s.selectAll("text")
            .attr("font-family", "system-ui, sans-serif")
            .attr("font-size", 9.5)
            .attr("fill", "#747474"));

        const x = d3.scaleBand()
          .domain(recent.map(s => s.year))
          .range([0, iw])
          .padding(0.18);

        const tt = makeTooltip(entity, gse, nivel, prueba);
        recent.forEach(s => {
          const xPos = x(s.year);
          if (xPos == null) return;
          const bw = x.bandwidth();
          const isLowN = s.n_estab === 1;
          const opacity = isLowN ? 0.45 : 1;

          if (showElemInsuf && s.pct < 100) {
            // Dos segmentos apilados sobre Adecuado: Elemental (medio) e
            // Insuficiente (arriba). Colores fijos, no por entidad, para que la
            // lectura sea consistente entre tarjetas.
            const segs = [
              { key: "ele", val: s.pct_ele, fill: COLOR_ELEM, label: "Elemental" },
              { key: "ins", val: s.pct_ins, fill: COLOR_INSUF, label: "Insuficiente" },
            ];
            let base = s.pct;  // apila desde el tope de Adecuado
            segs.forEach(seg => {
              if (seg.val == null || seg.val <= 0) return;
              const topY = y(Math.min(yMax, base + seg.val));
              const botY = y(Math.min(yMax, base));
              const h = botY - topY;
              base += seg.val;
              if (h > 0) {
                g.append("rect")
                  .attr("x", xPos).attr("y", topY)
                  .attr("width", bw).attr("height", h)
                  .attr("fill", seg.fill)
                  .attr("opacity", opacity)
                  .style("cursor", "pointer")
                  .on("mouseenter", e => tt.show(e, s, s.year, ref.current))
                  .on("mouseleave", tt.hide)
                  .on("click", e => { e.stopPropagation(); tt.pin(e, s, s.year, ref.current); });
                // Etiqueta % del segmento, en blanco, a la base de su franja.
                // Solo si la franja tiene alto suficiente para no amontonar texto.
                if (h >= 16) {
                  g.append("text")
                    .attr("x", xPos + bw / 2).attr("y", botY - 5)
                    .attr("text-anchor", "middle")
                    .attr("font-family", "system-ui, sans-serif")
                    .attr("font-size", 11)
                    .attr("font-weight", 700)
                    .attr("fill", "#FFFFFF")
                    .attr("opacity", isLowN ? 0.7 : 1)
                    .style("pointer-events", "none")
                    .text(fmtPctShort(seg.val));
                }
              }
            });
          }

          const yAdec = y(s.pct);
          const hAdec = ih - yAdec;
          g.append("rect")
            .attr("x", xPos).attr("y", yAdec)
            .attr("width", bw).attr("height", hAdec)
            .attr("fill", COLOR_ADEC)
            .attr("opacity", opacity)
            .style("cursor", "pointer")
            .on("mouseenter", e => tt.show(e, s, s.year, ref.current))
            .on("mouseleave", tt.hide)
            .on("click", e => { e.stopPropagation(); tt.pin(e, s, s.year, ref.current); });

          // En modo apilado la etiqueta va a la base de Adecuado, en blanco,
          // para no caer sobre el segmento Elemental. En modo solo-Adecuado
          // se mantiene encima de la barra, en color Adecuado.
          const stacked = showElemInsuf && s.pct < 100;
          const labelY = stacked ? Math.min(ih - 7, yAdec + 16) : yAdec - 5;
          const fill = stacked ? "#FFFFFF" : COLOR_ADEC;
          g.append("text")
            .attr("x", xPos + bw / 2).attr("y", labelY)
            .attr("text-anchor", "middle")
            .attr("font-family", "system-ui, sans-serif")
            .attr("font-size", 12)
            .attr("font-weight", 700)
            .attr("fill", fill)
            .attr("opacity", isLowN ? 0.7 : 1)
            .style("pointer-events", "none")
            .text(fmtPctShort(s.pct));

          g.append("text")
            .attr("x", xPos + bw / 2).attr("y", ih + 14)
            .attr("text-anchor", "middle")
            .attr("font-family", "system-ui, sans-serif")
            .attr("font-size", 10.5)
            .attr("font-weight", 500)
            .attr("fill", "#2E2230")
            .text(s.year);

          if (s.preliminar) {
            g.append("text")
              .attr("x", xPos + bw / 2).attr("y", -3)
              .attr("text-anchor", "middle")
              .attr("font-family", "system-ui, sans-serif")
              .attr("font-size", 13)
              .attr("font-weight", 900)
              .attr("fill", "#0062A0")
              .text("*");
          }
        });
      }, [entity.id, entity.name, (entity.comunas || []).join(","), gse, nivel, prueba, showElemInsuf, yScale, recentN]);
      return <svg ref={ref} className="bars-svg" />;
    }

    // ============================================================
    // Tabla con heat map
    // ============================================================
    // Umbrales fijos de heatmap
    const HEAT_THRESHOLDS = [
      { max: 25,  cls: "heat-band-1" },  // ≤25%  rojo
      { max: 50,  cls: "heat-band-2" },  // 26-50% naranja
      { max: 70,  cls: "heat-band-3" },  // 51-70% amarillo
      { max: 100, cls: "heat-band-4" },  // >70%  sin color
    ];
    function heatClass(pct) {
      if (pct == null) return "";
      for (const t of HEAT_THRESHOLDS) { if (pct <= t.max) return t.cls; }
      return "heat-band-4";
    }
    function isAlert(pct) { return pct != null && pct <= 25; }

    function ResultsTable({ entities, nivel, prueba, gseFilter, onCellClick }) {
      const YEARS = SimceData.YEARS.slice().reverse();
      const GSE_LEVELS = gseFilter
        ? SimceData.GSE_LEVELS.filter(g => g === gseFilter)
        : SimceData.GSE_LEVELS;

      const [focusYear, setFocusYear] = React.useState(null);

      const rowsRaw = [];
      entities.forEach(ent => {
        if (ent.kind === "estab") {
          const gseActual = SimceData.gseActualDeEstab({ rbd: ent.rbd, nivel, prueba });
          const gseLabel = SimceData.GSE_LABELS[gseActual] || gseActual;
          const series = SimceData.getSeriesForEntity(ent, gseLabel, nivel, prueba).slice().reverse();
          rowsRaw.push({ ent, gse: gseLabel, series });
        } else {
          GSE_LEVELS.forEach(gse => {
            const series = SimceData.getSeriesForEntity(ent, gse, nivel, prueba).slice().reverse();
            rowsRaw.push({ ent, gse, series });
          });
        }
      });

      const tableClass = "data-table data-table-heat" + (focusYear ? " has-year-focus" : "");

      return (
        <div className="table-wrap">
          <table className={tableClass}>
            <thead>
              <tr>
                <th className="th-ent">Entidad</th>
                <th className="th-gse">GSE</th>
                {YEARS.map(y => {
                  const isPrelim = SimceData.PRELIMINAR_YEARS.includes(y);
                  const isFocused = focusYear !== null && Number(focusYear) === Number(y);
                  let cls = "th-year";
                  if (isPrelim) cls += " th-prelim";
                  if (isFocused) cls += " th-focused-year";
                  return (
                    <th key={y} className={cls}
                      style={{ cursor: "pointer" }}
                      onClick={() => setFocusYear(focusYear === y ? null : y)}
                      title="Clic para enfocar este año">
                      {y}{isPrelim && <span className="prelim-mark"> *</span>}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {rowsRaw.map((r, i) => {
                const prevEnt = i > 0 ? rowsRaw[i - 1].ent : null;
                const startsEnt = !prevEnt || prevEnt.id !== r.ent.id;
                return (
                  <tr key={i} className={startsEnt ? "row-ent-start" : ""}>
                    <td className="td-ent">
                      {startsEnt && (
                        <span className="ent-cell">
                          <span className="ent-swatch entity-swatch" style={{ background: r.ent.color }} />
                          <span className="ent-name">{r.ent.name}</span>
                        </span>
                      )}
                    </td>
                    <td className="td-gse">{r.gse}</td>
                    {r.series.map(s => {
                      const hc = heatClass(s.pct);
                      const alert = isAlert(s.pct);
                      const isFocused = focusYear !== null && Number(focusYear) === Number(s.year);
                      let cls = "td-cell " + hc;
                      if (s.preliminar) cls += " td-prelim";
                      if (alert) cls += " td-alert";
                      if (isFocused) cls += " td-focused-year";
                      return (
                        <td key={s.year} className={cls}
                          style={s.pct != null ? { cursor: "pointer" } : undefined}
                          onClick={s.pct != null && onCellClick
                            ? (ev) => onCellClick({ entity: r.ent, gse: r.gse, ev })
                            : undefined}
                        >
                          {s.pct == null ? (
                            <span className="td-empty">—</span>
                          ) : (
                            <>
                              <span className="td-pct">{s.pct.toFixed(1).replace(".", ",")}%</span>
                              <span className="td-n"> ({fmtInt(s.n_eval)})</span>

                            </>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }
