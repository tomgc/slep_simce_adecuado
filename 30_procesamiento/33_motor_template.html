    // Genera y descarga un CSV con los datos actuales de la tabla
    function exportarCSV({ entities, nivel, prueba, gseFilter }) {
      const YEARS = SimceData.YEARS.slice().reverse();
      const GSE_LEVELS = gseFilter
        ? SimceData.GSE_LEVELS.filter(g => g === gseFilter)
        : SimceData.GSE_LEVELS;

      const rows = [["entidad", "nivel", "prueba", "gse", "gse_label", "anio", "pct_adecuado", "n_evaluados", "preliminar"]];
      entities.forEach(ent => {
        GSE_LEVELS.forEach(gse => {
          const series = SimceData.getSeriesForEntity(ent, gse, nivel, prueba);
          series.forEach(s => {
            rows.push([
              ent.name,
              nivel,
              prueba,
              gse,
              SimceData.GSE_LEVELS ? (DATA.meta.gse_labels[gse] || gse) : gse,
              s.year,
              s.pct != null ? String(s.pct).replace(".", ",") : "",
              s.n_eval != null ? s.n_eval : "",
              s.preliminar ? "1" : "0"
            ]);
          });
        });
      });

      const csvContent = rows.map(r => r.map(v => {
        const str = String(v);
        return str.includes(";") || str.includes('"') ? '"' + str.replace(/"/g, '""') + '"' : str;
      }).join(";")).join("\n");

      const blob = new Blob(["﻿" + csvContent], { type: "text/csv;charset=utf-8;" });
      const fname = "simce_adecuado_" + nivel.replace(/[^a-zA-Z0-9]/g, "_") + "_" + prueba.replace(/[^a-zA-Z0-9]/g, "_") + ".csv";
      descargarBlob(blob, fname);
    }


    // ============================================================
    // construirSvgGraficos — SVG compuesto del supergrid (base de export SVG/PNG)
    // ============================================================
    function construirSvgGraficos({ entities, nivel, prueba }) {
      const GSE_LEVELS = SimceData.GSE_LEVELS;

      // Dimensiones de cada SVG fuente (deben coincidir con viewBox de cada subchart)
      const SPARK_W = 320, SPARK_H = 90;
      const BARS_W  = 320, BARS_H  = 165;

      // Layout del SVG compuesto
      const COL_GSE   = 110;   // ancho columna etiqueta GSE
      const CELL_W    = 340;   // ancho de cada celda de entidad
      const CELL_H    = SPARK_H + BARS_H + 30; // sparkline + barras + cabecera celda
      const HEADER_H  = 72;   // fila de encabezados de entidad
      const TITLE_H   = 56;   // fila de título del SVG
      const PAD       = 20;   // padding general
      const COL_GAP   = 10;   // gap entre columnas

      const nEnts   = entities.length;
      const totalW  = PAD + COL_GSE + nEnts * CELL_W + (nEnts - 1) * COL_GAP + PAD;
      const totalH  = TITLE_H + HEADER_H + GSE_LEVELS.length * CELL_H + PAD * 2;

      const NS = "http://www.w3.org/2000/svg";

      function el(tag, attrs = {}, parent) {
        const node = document.createElementNS(NS, tag);
        Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, v));
        if (parent) parent.appendChild(node);
        return node;
      }

      function txt(content, attrs = {}, parent) {
        const node = el("text", attrs, parent);
        node.textContent = content;
        return node;
      }

      // SVG raíz
      const root = el("svg", {
        xmlns: NS,
        width: totalW,
        height: totalH,
        viewBox: `0 0 ${totalW} ${totalH}`,
      });

      // Fondo
      el("rect", { x: 0, y: 0, width: totalW, height: totalH, fill: "#FFF6E0" }, root);

      // Título
      const titleG = el("g", { transform: `translate(${PAD}, 0)` }, root);
      txt(`Motor Simce — Adecuado · ${prueba} · ${nivel}`, {
        x: 0, y: 34,
        "font-family": "system-ui, sans-serif",
        "font-size": 18, "font-weight": 800,
        fill: "#0A3A5C",
      }, titleG);
      const exportDate = new Date().toLocaleDateString("es-CL", { day: "2-digit", month: "long", year: "numeric" });
      txt(`SLEP Costa Central · Exportado el ${exportDate}`, {
        x: 0, y: 52,
        "font-family": "system-ui, sans-serif",
        "font-size": 11, fill: "#747474",
      }, titleG);

      // Encabezados de entidad
      entities.forEach((ent, ei) => {
        const cx = PAD + COL_GSE + ei * (CELL_W + COL_GAP);
        const gy = TITLE_H;
        const g = el("g", { transform: `translate(${cx}, ${gy})` }, root);

        // Swatch de color
        el("rect", { x: 0, y: 10, width: 14, height: 14, rx: 2, fill: ent.color }, g);

        // Nombre
        txt(ent.name, {
          x: 20, y: 22,
          "font-family": "system-ui, sans-serif",
          "font-size": 14, "font-weight": 800,
          fill: "#1C1212",
        }, g);

        // Meta
        const metaProsp = ent.kind === "slep" && SimceData.slepEsProspectivo(ent.anio_traspaso)
          ? ` · traspaso ${ent.anio_traspaso}` : "";
        const meta = (ent.kind === "slep"   ? `SLEP · ${ent.comunas.length} comunas`
          : ent.kind === "region" ? `Región · ${ent.comunas.length} comunas`
          : ent.kind === "estab"  ? `RBD ${ent.rbd}`
          : ent.kind === "group"  ? `Grupo · ${ent.comunas.length} comunas`
          : ent.depe2 ? (SimceData.DEPE2_LABELS[ent.depe2] || ent.depe2) : "Comuna") + metaProsp;
        txt(meta, {
          x: 20, y: 38,
          "font-family": "system-ui, sans-serif",
          "font-size": 10, fill: "#747474",
        }, g);

        // Línea separadora bajo encabezado
        el("line", {
          x1: 0, y1: HEADER_H - 4, x2: CELL_W, y2: HEADER_H - 4,
          stroke: "#4A2746", "stroke-width": 2,
        }, g);
      });

      // Filas GSE
      GSE_LEVELS.forEach((gse, gi) => {
        const rowY = TITLE_H + HEADER_H + gi * CELL_H;

        // Etiqueta GSE columna izquierda
        const gseG = el("g", { transform: `translate(${PAD}, ${rowY})` }, root);
        el("rect", { x: 0, y: 0, width: COL_GSE - 8, height: CELL_H,
          fill: gi % 2 === 0 ? "#FFFBEF" : "#F4E9CC", rx: 4 }, gseG);
        txt("GSE", {
          x: (COL_GSE - 8) / 2, y: CELL_H / 2 - 10,
          "text-anchor": "middle",
          "font-family": "system-ui, sans-serif",
          "font-size": 9, "font-weight": 700,
          "letter-spacing": "0.1em",
          fill: "#747474",
        }, gseG);
        txt(gse, {
          x: (COL_GSE - 8) / 2, y: CELL_H / 2 + 8,
          "text-anchor": "middle",
          "font-family": "system-ui, sans-serif",
          "font-size": 13, "font-weight": 800,
          fill: "#0A3A5C",
        }, gseG);

        // Celdas de entidad
        entities.forEach((ent, ei) => {
          const cx = PAD + COL_GSE + ei * (CELL_W + COL_GAP);

          // Fondo de celda
          const cellG = el("g", { transform: `translate(${cx}, ${rowY})` }, root);
          el("rect", { x: 0, y: 0, width: CELL_W, height: CELL_H,
            fill: "#FFFFFF", rx: 6,
            stroke: "#E7DFC9", "stroke-width": 1 }, cellG);

          // Buscar el div .chart-cell con los data-attrs correspondientes
          const cellDiv = document.querySelector(
            `.chart-cell[data-entity-id="${ent.id}"][data-gse="${gse}"]`
          );
          if (!cellDiv || cellDiv.classList.contains("is-empty")) {
            // Celda vacía — mensaje
            txt("Sin datos", {
              x: CELL_W / 2, y: CELL_H / 2,
              "text-anchor": "middle",
              "font-family": "system-ui, sans-serif",
              "font-size": 11, fill: "#BCA493",
            }, cellG);
            return;
          }

          // Subcabecera dentro de la celda
          txt("Trayectoria histórica", {
            x: 8, y: 16,
            "font-family": "system-ui, sans-serif",
            "font-size": 8, "font-weight": 700,
            "letter-spacing": "0.08em", fill: "#747474",
          }, cellG);

          // Clonar sparkline SVG
          const sparkSvg = cellDiv.querySelector(".sparkline-svg");
          if (sparkSvg) {
            const sparkClone = sparkSvg.cloneNode(true);
            sparkClone.setAttribute("x", 0);
            sparkClone.setAttribute("y", 20);
            sparkClone.setAttribute("width", CELL_W);
            sparkClone.setAttribute("height", SPARK_H);
            sparkClone.setAttribute("viewBox", `0 0 ${SPARK_W} ${SPARK_H}`);
            sparkClone.setAttribute("preserveAspectRatio", "xMidYMid meet");
            // Remover event listeners del clon (son funciones en el original, no se copian)
            cellG.appendChild(sparkClone);
          }

          txt("Últimas 3 aplicaciones", {
            x: 8, y: SPARK_H + 32,
            "font-family": "system-ui, sans-serif",
            "font-size": 8, "font-weight": 700,
            "letter-spacing": "0.08em", fill: "#747474",
          }, cellG);

          // Clonar bars SVG
          const barsSvg = cellDiv.querySelector(".bars-svg");
          if (barsSvg) {
            const barsClone = barsSvg.cloneNode(true);
            barsClone.setAttribute("x", 0);
            barsClone.setAttribute("y", SPARK_H + 36);
            barsClone.setAttribute("width", CELL_W);
            barsClone.setAttribute("height", BARS_H);
            barsClone.setAttribute("viewBox", `0 0 ${BARS_W} ${BARS_H}`);
            barsClone.setAttribute("preserveAspectRatio", "xMidYMid meet");
            cellG.appendChild(barsClone);
          }
        });
      });

      // Serializar
      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(root);
      const fnameBase = `simce_adecuado_${nivel.replace(/[^a-zA-Z0-9]/g, "_")}_${prueba.replace(/[^a-zA-Z0-9]/g, "_")}`;
      return { svgStr, totalW, totalH, fnameBase };
    }

    function descargarBlob(blob, fname) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fname;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportarGraficosSVG({ entities, nivel, prueba }) {
      const { svgStr, fnameBase } = construirSvgGraficos({ entities, nivel, prueba });
      descargarBlob(new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" }), fnameBase + ".svg");
    }

    // Rasteriza el mismo SVG compuesto a PNG. Factor 2x para nitidez en
    // documentos/presentaciones sin inflar demasiado el peso del archivo.
    const PNG_SCALE = 2;
    function exportarGraficosPNG({ entities, nivel, prueba }) {
      const { svgStr, totalW, totalH, fnameBase } = construirSvgGraficos({ entities, nivel, prueba });
      const svgBlob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = totalW * PNG_SCALE;
        canvas.height = totalH * PNG_SCALE;
        const ctx = canvas.getContext("2d");
        ctx.scale(PNG_SCALE, PNG_SCALE);
        ctx.drawImage(img, 0, 0, totalW, totalH);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob => {
          if (!blob) { alert("No se pudo generar el PNG."); return; }
          descargarBlob(blob, fnameBase + ".png");
        }, "image/png");
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        alert("No se pudo rasterizar el SVG a PNG.");
      };
      img.src = url;
    }

    // ============================================================
    // GseFilter — selector de GSE para tabla

    function GseFilter({ gseFilter, setGseFilter }) {

          <select value={gseFilter} onChange={e => setGseFilter(e.target.value)}>

    // ============================================================
    // EstabPopup — lista de establecimientos de una entidad
    // ============================================================
    // Props:
    //   entity   — entidad (kind, comunas, depe2, rbds, name, _popupPos)
    //   nivel    — label de nivel activo
    //   prueba   — label de prueba activo
    //   onClose  — callback cierre
    //   gse      — (opcional) código GSE; si viene, filtra por ese GSE
    function EstabPopup({ entity, nivel, prueba, onClose, gse, year }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        function handleClick(e) {
          if (ref.current && !ref.current.contains(e.target)) onClose();
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      const nv = SimceData.NIVEL_LABEL_TO_COD[nivel];
      const pr = SimceData.PRUEBA_LABEL_TO_COD[prueba];

      // RBDs que rindieron el nivel × prueba activos
      const rbdsNP = new Set();
      if (DATA.rbds_por_nivel) {
        DATA.rbds_por_nivel
          .filter(r => r.nivel === nv && r.prueba === pr)
          .forEach(r => rbdsNP.add(String(r.rbd)));
      }

      // Filtro GSE: si viene year, usar DATA.simce_rbd (misma fuente que n_estab, umbral aplicado)
      // Si no viene year, usar DATA.rbd_gse (todos los años)
      let rbdsGSE = null;
      if (gse) {
        const gseCod = SimceData.GSE_LABEL_TO_COD[gse] != null
          ? String(SimceData.GSE_LABEL_TO_COD[gse])
          : String(gse);

        if (year != null && DATA.simce_rbd) {
          // Fuente exacta: establecimientos con dato PUBLICABLE en ese
          // año × GSE × nivel × prueba. Se exige palu no-NA: la Agencia suprime
          // el resultado de establecimientos con muy pocos alumnos evaluados
          // (deja palu = NA aunque nalu > 0). Esos RBDs no deben listarse en el
          // popup, porque no tienen resultado publicado para esa celda.
          const D2 = DATA.simce_rbd;
          rbdsGSE = new Set();
          for (let i = 0; i < D2.rbd.length; i++) {
            if (
              String(D2.cod_grupo[i]) === gseCod &&
              D2.nivel[i] === nv &&
              D2.prueba[i] === pr &&
              D2.anio[i] === year &&
              D2.palu[i] != null
            ) {
              rbdsGSE.add(String(D2.rbd[i]));
            }
          }
        } else if (DATA.rbd_gse) {
          rbdsGSE = new Set(
            DATA.rbd_gse
              .filter(r => String(r.cod_grupo) === gseCod && r.nivel === nv && r.prueba === pr)
              .map(r => String(r.rbd))
          );
        }
      }

      // Obtener establecimientos.
      // Para SLEP: el universo es entity.rbds (lista exacta de RBDs del SLEP,
      // construida en el pipeline). Filtrar por comuna+depe2 es incorrecto:
      // dos SLEP pueden compartir comuna, y los RBDs de un SLEP prospectivo
      // figuran como municipales. La lista de RBDs es la única fuente de verdad.
      // Para el resto de entidades se mantiene el filtro comuna (+depe2).
      let items = [];
      if (DATA.establecimientos) {
        const setCom = new Set(entity.comunas || []);
        const isNacional = entity.kind === "nacional";
        const rbdsSlep = entity.kind === "slep" ? new Set((entity.rbds || []).map(String)) : null;
        items = DATA.establecimientos
          .filter(r => {
            if (entity.kind === "slep") {
              if (!rbdsSlep.has(String(r.rbd))) return false;
            } else {
              if (!isNacional && !setCom.has(String(r.cod_com_rbd))) return false;
              if (entity.depe2) {
                if (String(r.cod_depe2) !== String(entity.depe2)) return false;
              }
            }
            if (!rbdsNP.has(String(r.rbd))) return false;
            if (rbdsGSE !== null && !rbdsGSE.has(String(r.rbd))) return false;
            return true;
          })
          .map(r => ({ rbd: r.rbd, nom: r.nom_rbd, com: r.nom_com_rbd }));
      }

      const gseLabel = gse || null;
      const yearLabel = year != null ? ` · ${year}` : "";
      const title = entity.name + (gseLabel ? ` — GSE ${gseLabel}` : "") + yearLabel;
      const pos = entity._popupPos || {};

      return (
        <div ref={ref} className="estab-popup" style={{
          top: (pos.top || 100) + "px",
          left: (pos.left || 100) + "px",
        }}>
          <div className="estab-popup-header">
            <span className="estab-popup-title">{title}</span>
            <button className="icon-btn" onClick={onClose}><Icon name="x" /></button>
          </div>
          <div style={{ fontSize: 11, color: "var(--fg-3)", marginBottom: 4 }}>
            {items.length} establecimientos
          </div>
          <div className="estab-popup-list">
            {items.length === 0 ? (
              <div style={{ fontSize: 12, color: "var(--fg-3)" }}>Sin información de establecimientos.</div>
            ) : items.map((it, i) => (
              <div key={i} className="estab-popup-item">
                <span className="estab-popup-rbd">{it.rbd}</span>
                <span className="estab-popup-nom">{it.nom}</span>
                <span className="estab-popup-com">{it.com}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================
    // Modal agregar entidad — v2 con tabs: Comuna | SLEP | Región | Establecimiento | Grupo
    // ============================================================
    // Disclaimer metodológico: la clasificación por dependencia es la ACTUAL y
    // se aplica a toda la serie, sin corte por año de traspaso. Aparece donde se
    // puede seleccionar dependencia SLEP y como nota permanente en entidades SLEP.
    function SlepDisclaimer({ compact }) {
      return (
        <div className={"slep-disclaimer" + (compact ? " is-compact" : "")}>
          <Icon name="info" />
          <span>
            Los establecimientos se clasifican según su dependencia <strong>actual</strong>.
            Un Servicio Local de Educación Pública (SLEP) agrupa a sus establecimientos en
            toda la serie histórica, incluidos los años anteriores a su traspaso, cuando la
            gestión era municipal. Las cifras previas al año de traspaso no son atribuibles
            a la gestión del SLEP.
          </span>
        </div>
      );
    }

    function AddEntityModal({ editing, onSave, onSaveMany, onCancel, takenColors, slotsLibres }) {
      const [tab, setTab] = React.useState(
        editing?.kind === "slep" ? "slep"
          : editing?.kind === "region" ? "region"
          : editing?.kind === "nacional" ? "nacional"
          : editing?.kind === "estab" ? "estab"
          : editing?.kind === "group" ? "group"
          : "estab"
      );
      // Tab comuna
      const [comunaCod, setComunaCod] = React.useState(
        editing?.kind === "comuna" ? (editing.comunas?.[0] || "") : ""
      );
      const [depe2, setDepe2] = React.useState(editing?.depe2 || "");
      // Tab SLEP — selección múltiple (Set de cod_slep). En edición, un solo elemento.
      const [slepSearch, setSlepSearch] = React.useState("");
      const [selectedSleps, setSelectedSleps] = React.useState(
        editing?.kind === "slep" ? [editing.cod_slep] : []
      );
      // Tab región — selección múltiple (Set de cod_reg). En edición, un solo elemento.
      const [selectedRegions, setSelectedRegions] = React.useState(
        editing?.kind === "region" ? [editing.cod_reg] : []
      );
      const [regionSearch, setRegionSearch] = React.useState("");
      // Tab establecimiento
      const [estabSearch, setEstabSearch] = React.useState(
        editing?.kind === "estab" ? editing.name : ""
      );
      const [selectedEstab, setSelectedEstab] = React.useState(
        editing?.kind === "estab" ? { rbd: editing.rbd, nom: editing.name, com: editing.com } : null
      );
      // Tab grupo
      const [groupName, setGroupName] = React.useState(editing?.kind === "group" ? editing.name : "");
      const [groupComunas, setGroupComunas] = React.useState(editing?.kind === "group" ? editing.comunas : []);
      const [search, setSearch] = React.useState("");

      const availableColor = React.useMemo(() => {
        return ENTITY_PALETTE.find(c => !takenColors.includes(c)) || ENTITY_PALETTE[0];
      }, [takenColors]);

      const allComunas = SimceData.REGIONES.flatMap(r =>
        r.comunas.map(c => ({ cod_com: c.cod_com, nombre: c.nombre, region: r.nombre }))
      );
      const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
      const filteredComunas = (() => {
        if (!search) return allComunas;
        const s = norm(search);
        const byNombre = allComunas.filter(({ nombre }) => norm(nombre).includes(s));
        const byRegion = allComunas.filter(({ nombre, region: rn }) =>
          !norm(nombre).includes(s) && norm(rn).includes(s)
        );
        return [...byNombre, ...byRegion];
      })();
      const filteredSleps = SimceData.SLEPS.filter(s => {
        if (!slepSearch) return true;
        return norm(s.nombre).includes(norm(slepSearch));
      });

      // Límite de selección múltiple: en alta, tantos como slots libres; en edición, 1.
      const maxSel = editing ? 1 : Math.max(1, slotsLibres || 0);
      function toggleSel(cod, lista, setLista) {
        if (lista.includes(cod)) {
          setLista(lista.filter(x => x !== cod));
        } else {
          if (lista.length >= maxSel) return;
          setLista([...lista, cod]);
        }
      }

      function handleSave() {
        const color = editing?.color || availableColor;
        if (tab === "comuna") {
          if (!comunaCod) return;
          const c = SimceData.COMUNA_BY_COD.get(comunaCod);
          if (!c) return;
          const depe2Label = depe2 ? SimceData.DEPE2_LABELS[depe2] : "Todas las dependencias";
          onSave({
            id: editing?.id || ("e" + Date.now()),
            name: c.nom + (depe2 ? " · " + SimceData.DEPE2_LABELS[depe2] : ""),
            kind: "comuna",
            comunas: [comunaCod],
            depe2: depe2 || null,
            color,
          });
        } else if (tab === "region") {
          if (selectedRegions.length === 0) return;
          const nuevas = selectedRegions.map(cod => {
            const reg = SimceData.REGIONES.find(r => r.cod_reg === cod);
            if (!reg) return null;
            return {
              id: editing?.id || ("e" + Date.now() + "_" + cod),
              name: reg.nombre + (depe2 ? " · " + SimceData.DEPE2_LABELS[depe2] : ""),
              kind: "region",
              cod_reg: reg.cod_reg,
              comunas: reg.comunas.map(c => c.cod_com),
              depe2: depe2 || null,
              // En alta múltiple el color lo asigna saveEntities() por índice;
              // en edición se conserva el color existente más abajo.
              color: editing ? color : undefined,
            };
          }).filter(Boolean);
          if (editing) { onSave(nuevas[0]); } else { onSaveMany(nuevas); }
          return;
        } else if (tab === "estab") {
          if (!selectedEstab) return;
          onSave({
            id: editing?.id || ("e" + Date.now()),
            name: selectedEstab.nom,
            kind: "estab",
            rbd: selectedEstab.rbd,
            com: selectedEstab.com,
            comunas: [selectedEstab.cod_com],
            depe2: selectedEstab.depe2 || null,
            color,
          });
        } else if (tab === "slep") {
          if (selectedSleps.length === 0) return;
          const nuevas = selectedSleps.map(cod => {
            const slep = SimceData.SLEPS.find(s => s.cod_slep === cod);
            if (!slep) return null;
            return {
              id: editing?.id || ("e" + Date.now() + "_" + cod),
              name: "SLEP " + slep.nombre,
              kind: "slep",
              cod_slep: slep.cod_slep,
              comunas: slep.comunas,
              rbds: slep.rbds,
              anio_traspaso: slep.anio_traspaso,
              // En alta múltiple el color lo asigna saveEntities() por índice.
              color: editing ? color : undefined,
            };
          }).filter(Boolean);
          if (editing) { onSave(nuevas[0]); } else { onSaveMany(nuevas); }
          return;
        } else if (tab === "nacional") {
          onSave({
            id: editing?.id || ("e" + Date.now()),
            name: "Chile" + (depe2 ? " · " + SimceData.DEPE2_LABELS[depe2] : ""),
            kind: "nacional",
            depe2: depe2 || null,
            color,
          });
        } else {
          onSave({
            id: editing?.id || ("e" + Date.now()),
            name: groupName,
            kind: "group",
            comunas: groupComunas,
            depe2: null,
            color,
          });
        }
      }

      return (
        <div className="modal-backdrop" onClick={onCancel}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <h3 className="modal-title">{editing ? "Editar entidad" : "Agregar entidad"}</h3>
              <button className="icon-btn" onClick={onCancel}><Icon name="x" /></button>
            </div>
            <div className="modal-tabs">
              <button className={"modal-tab" + (tab === "estab" ? " is-active" : "")} onClick={() => setTab("estab")}>Establecimiento</button>
              <button className={"modal-tab" + (tab === "comuna" ? " is-active" : "")} onClick={() => setTab("comuna")}>Comuna</button>
              <button className={"modal-tab" + (tab === "slep" ? " is-active" : "")} onClick={() => setTab("slep")}>SLEP</button>
              <button className={"modal-tab" + (tab === "region" ? " is-active" : "")} onClick={() => setTab("region")}>Región</button>
              <button className={"modal-tab" + (tab === "nacional" ? " is-active" : "")} onClick={() => setTab("nacional")}>Nacional</button>
              <button className={"modal-tab" + (tab === "group" ? " is-active" : "")} onClick={() => setTab("group")}>Grupo personalizado</button>
            </div>
            <div className="modal-body">
              {tab === "estab" && (() => {
                const filtered = estabSearch.length >= 3
                  ? SimceData.ESTAB_LIST.filter(e =>
                      norm(e.nom).includes(norm(estabSearch)) ||
                      e.rbd.includes(estabSearch)
                    ).slice(0, 20)
                  : [];
                return (
                  <div className="form-grid">
                    <label className="field field-full">
                      <span className="field-label">Buscar establecimiento</span>
                      <span className="field-hint" style={{ fontSize: 11, color: "var(--fg-3)" }}>
                        Escribe al menos 3 caracteres (nombre o RBD)
                      </span>
                      <input
                        className="input input-search"
                        type="text"
                        placeholder="Ej. Liceo Bicentenario, 5103…"
                        value={estabSearch}
                        onChange={e => { setEstabSearch(e.target.value); setSelectedEstab(null); }}
                      />
                      {filtered.length > 0 && !selectedEstab && (
                        <div className="comuna-checklist" style={{ maxHeight: 260, marginTop: 4 }}>
                          {filtered.map(e => (
                            <label key={e.rbd}
                              className="check-row"
                              style={{ cursor: "pointer" }}
                              onClick={() => { setSelectedEstab(e); setEstabSearch(e.nom); }}>
                              <span style={{ fontWeight: 500 }}>{e.nom}</span>
                              <span style={{ fontSize: 11, color: "var(--fg-3)", marginLeft: "auto" }}>
                                RBD {e.rbd} · {e.com}
                              </span>
                            </label>
                          ))}
                        </div>
                      )}
                      {selectedEstab && (
                        <div className="check-row is-selected" style={{ marginTop: 4 }}>
                          <span style={{ fontWeight: 500 }}>{selectedEstab.nom}</span>
                          <span style={{ fontSize: 11, color: "var(--fg-3)", marginLeft: "auto" }}>
                            RBD {selectedEstab.rbd} · {selectedEstab.com}
                          </span>
                        </div>
                      )}
                    </label>
                  </div>
                );
              })()}
              {tab === "region" && (
                <div className="form-grid">
                  <label className="field field-full">
                    <span className="field-label">Región</span>
                    <input
                      className="input input-search"
                      type="text"
                      placeholder="Buscar región…"
                      value={regionSearch}
                      onChange={e => setRegionSearch(e.target.value)}
                    />
                    <span className="multiselect-hint">
                      {editing ? "Edición: una región." : `Puedes elegir varias. ${selectedRegions.length} de ${maxSel} seleccionadas.`}
                    </span>
                    <div className="comuna-checklist" style={{ maxHeight: 260, marginTop: 4 }}>
                      {SimceData.REGIONES
                        .filter(r => !regionSearch || norm(r.nombre).includes(norm(regionSearch)))
                        .map(r => {
                          const checked = selectedRegions.includes(r.cod_reg);
                          const bloqueado = !checked && selectedRegions.length >= maxSel;
                          return (
                            <label key={r.cod_reg}
                              className={"check-row" + (checked ? " is-selected" : "") + (bloqueado ? " is-disabled" : "")}
                              style={{ cursor: bloqueado ? "not-allowed" : "pointer" }}>
                              <input type={editing ? "radio" : "checkbox"} name="region" value={r.cod_reg}
                                checked={checked} disabled={bloqueado}
                                onChange={() => toggleSel(r.cod_reg, selectedRegions, setSelectedRegions)} />
                              <span className="check-name">{r.nombre}</span>
                              <span className="check-region">{r.comunas.length} comunas</span>
                            </label>
                          );
                        })
                      }
                    </div>
                  </label>
                  {depe2 === "5" && <SlepDisclaimer />}
                  <label className="field field-full">
                    <span className="field-label">Dependencia</span>
                    <select className="select" value={depe2} onChange={e => setDepe2(e.target.value)}>
                      <option value="">Todas las dependencias</option>
                      {SimceData.DEPE2_CODES.map(d => (
                        <option key={d} value={d}>{SimceData.DEPE2_LABELS[d]}</option>
                      ))}
                    </select>
                  </label>
                </div>
              )}
              {tab === "comuna" && (
                <div className="form-grid">
                  <label className="field field-full">
                    <span className="field-label">Comuna</span>
                    <input
                      className="input input-search"
                      type="text"
                      placeholder="Buscar comuna…"
                      value={search}
                      onChange={e => { setSearch(e.target.value); setComunaCod(""); }}
                    />
                    {search && filteredComunas.length > 0 && !comunaCod && (
                      <div className="comuna-checklist" style={{ maxHeight: 200, marginTop: 4 }}>
                        {filteredComunas.slice(0, 60).map(c => (
                          <label key={c.cod_com} className="check-row" style={{ cursor: "pointer" }}
                            onClick={() => { setComunaCod(c.cod_com); setSearch(c.nombre); }}>
                            <span style={{ fontWeight: 500 }}>{c.nombre}</span>
                            <span style={{ fontSize: 11, color: "var(--fg-3)", marginLeft: "auto" }}>{c.region}</span>
                          </label>
                        ))}
                      </div>
                    )}
                  </label>
                  {depe2 === "5" && <SlepDisclaimer />}
                  <label className="field field-full">
                    <span className="field-label">Dependencia</span>
                    <select className="select" value={depe2} onChange={e => setDepe2(e.target.value)}>
                      <option value="">Todas las dependencias</option>
                      {SimceData.DEPE2_CODES.map(d => (
                        <option key={d} value={d}>{SimceData.DEPE2_LABELS[d]}</option>
                      ))}
                    </select>
                  </label>
                  <div className="field field-full">
                    <span className="field-label">Color</span>
                    <div className="color-preview">
                      <span className="entity-swatch" style={{ background: editing?.color || availableColor }} />
                      <span className="color-note">Asignado automáticamente.</span>
                    </div>
                  </div>
                </div>
              )}
              {tab === "slep" && (
                <div className="form-grid">
                  <SlepDisclaimer />
                  <label className="field field-full">
                    <span className="field-label">Buscar SLEP</span>
                    <input className="input input-search" type="text" placeholder="Nombre del SLEP…"
                      value={slepSearch} onChange={e => setSlepSearch(e.target.value)} />
                  </label>
                  <div className="field field-full">
                    <span className="multiselect-hint">
                      {editing ? "Edición: un SLEP." : `Puedes elegir varios. ${selectedSleps.length} de ${maxSel} seleccionados.`}
                    </span>
                    <div className="comuna-checklist" style={{ maxHeight: 260 }}>
                      {filteredSleps.map(s => {
                        const checked = selectedSleps.includes(s.cod_slep);
                        const bloqueado = !checked && selectedSleps.length >= maxSel;
                        return (
                          <label key={s.cod_slep}
                            className={"check-row" + (checked ? " is-selected" : "") + (bloqueado ? " is-disabled" : "")}
                            style={{ cursor: bloqueado ? "not-allowed" : "pointer" }}>
                            <input type={editing ? "radio" : "checkbox"} name="slep" value={s.cod_slep}
                              checked={checked} disabled={bloqueado}
                              onChange={() => toggleSel(s.cod_slep, selectedSleps, setSelectedSleps)} />
                            <span className="check-name">{s.nombre}</span>
                            <span className="check-region">
                              {s.comunas.length} comunas · traspaso {s.anio_traspaso || "pendiente"}
                              {SimceData.slepEsProspectivo(s.anio_traspaso) && (
                                <span className="badge-traspaso" title={"Traspaso " + s.anio_traspaso + ": los resultados mostrados corresponden íntegramente a la administración municipal previa al traspaso."}>
                                  traspaso {s.anio_traspaso}
                                </span>
                              )}
                            </span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}
              {tab === "nacional" && (
                <div className="form-grid">
                  <div className="field field-full">
                    <span className="field-label">Entidad</span>
                    <p style={{ fontSize: 13, color: "var(--fg-2)", margin: "4px 0 0" }}>
                      Agrega <strong>Chile</strong> como entidad de referencia nacional.
                      Incluye todos los establecimientos del país con datos disponibles en cada año.
                    </p>
                  </div>
                  {depe2 === "5" && <SlepDisclaimer />}
                  <label className="field field-full">
                    <span className="field-label">Dependencia</span>
                    <select className="select" value={depe2} onChange={e => setDepe2(e.target.value)}>
                      <option value="">Todas las dependencias</option>
                      {SimceData.DEPE2_CODES.map(d => (
                        <option key={d} value={d}>{SimceData.DEPE2_LABELS[d]}</option>
                      ))}
                    </select>
                  </label>
                </div>
              )}
              {tab === "group" && (
                <div className="form-grid">
                  <label className="field field-full">
                    <span className="field-label">Nombre del grupo</span>
                    <input className="input" type="text" placeholder="Ej. Comunas costeras"
                      value={groupName} onChange={e => setGroupName(e.target.value)} />
                  </label>
                  <label className="field field-full">
                    <span className="field-label">
                      Comunas <span className="field-hint">{groupComunas.length} seleccionadas</span>
                    </span>
                    <input className="input input-search" type="text" placeholder="Buscar comuna…"
                      value={search} onChange={e => setSearch(e.target.value)} />
                    <div className="comuna-checklist">
                      {filteredComunas.map(({ cod_com, nombre, region: rn }) => (
                        <label key={cod_com} className="check-row">
                          <input type="checkbox" checked={groupComunas.includes(cod_com)}
                            onChange={e => {
                              if (e.target.checked) setGroupComunas([...groupComunas, cod_com]);
                              else setGroupComunas(groupComunas.filter(c => c !== cod_com));
                            }} />
                          <span className="check-name">{nombre}</span>
                          <span className="check-region">{rn}</span>
                        </label>
                      ))}
                    </div>
                  </label>
                </div>
              )}
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={onCancel}>Cancelar</button>
              <button className="btn btn-primary" onClick={handleSave}>
                {editing ? "Guardar cambios" : "Agregar al análisis"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // App principal
    // ============================================================
    function App() {
      const niveles = Object.entries(DATA.meta.niveles)
        .sort(([a], [b]) => a === "4b" ? -1 : 1).map(([,v]) => v);
      const pruebas = Object.values(DATA.meta.pruebas);

      const [nivel, setNivel] = React.useState(niveles[0]);
      const [prueba, setPrueba] = React.useState(pruebas[0]);
      const [entities, setEntities] = React.useState([]);
      const [modal, setModal] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [notesOpen, setNotesOpen] = React.useState(false);
      const [gseFilter, setGseFilter] = React.useState("");
      const [estabPopup, setEstabPopup] = React.useState(null); // { entity, pos }
      const [cellPopup, setCellPopup] = React.useState(null);   // { entity, gse, pos }
      const [chartPopup, setChartPopup] = React.useState(null); // { entity, gse } desde tooltip gráfico

      // Parámetros de visualización. yScale fijo (panel de ajustes removido en
      // sesión 10). showElemInsuf controlable vía toggle (sesión 14).
      const [showElemInsuf, setShowElemInsuf] = React.useState(false);
      const yScale = "100";

      const firstRender = React.useRef(true);
      React.useEffect(() => {
        if (firstRender.current) { firstRender.current = false; return; }
        setLoading(true);
        const id = setTimeout(() => setLoading(false), 420);
        return () => clearTimeout(id);
      }, [nivel, prueba]);

      // Exponer función global para que makeTooltip (imperativo) pueda abrir el popup
      React.useEffect(() => {
        window.__openChartEstabPopup = function(detail) {
          const { entity, gse, year } = detail;
          setChartPopup({
            entity: {
              ...entity,
              _popupPos: {
                top: Math.max(60, (window.innerHeight / 2) - 200),
                left: Math.max(20, (window.innerWidth / 2) - 150),
              }
            },
            gse,
            year,
          });
        };
        return () => { window.__openChartEstabPopup = null; };
      }, []);

      // Estado por defecto al montar: si el tablero está vacío, sembrar las
      // comunas del SLEP Costa Central (ver entidadesPorDefecto()).
      React.useEffect(() => {
        setEntities(prev => prev.length ? prev : entidadesPorDefecto());
      }, []);

      function saveEntity(ent) {
        setEntities(prev => {
          const idx = prev.findIndex(p => p.id === ent.id);
          if (idx >= 0) {
            const next = [...prev]; next[idx] = ent; return next;
          }
          if (prev.length >= MAX_ENTIDADES) { alert("Máximo de comparación: 4 entidades. Elimina una antes de agregar otra."); return prev; }
          return [...prev, ent];
        });
        setModal(null);
      }

      // Alta en lote (multi-selección de SLEP o regiones). Respeta el tope y
      // asigna colores distintos a cada nueva entidad.
      function saveEntities(nuevas) {
        setEntities(prev => {
          const libres = MAX_ENTIDADES - prev.length;
          const aAgregar = nuevas.slice(0, Math.max(0, libres));
          const usados = prev.map(e => e.color);
          const disponibles = ENTITY_PALETTE.filter(c => !usados.includes(c));
          const conColor = aAgregar.map((e, i) => ({
            ...e, color: e.color || disponibles[i] || ENTITY_PALETTE[i % ENTITY_PALETTE.length],
          }));
          return [...prev, ...conColor];
        });
        setModal(null);
      }

      // Estado por defecto del motor: las comunas del SLEP Costa Central con
      // dependencia Servicio Local (depe2="5"). Se derivan EN RUNTIME desde
      // SimceData.SLEPS (sin hardcodear cod_com ni cod_slep); el nombre del SLEP
      // se localiza por coincidencia normalizada. Respeta el tope MAX_ENTIDADES.
      // Si el SLEP no aparece, devuelve [] y no rompe el render.
      function entidadesPorDefecto() {
        const norm = s => String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const slep = SimceData.SLEPS.find(s => norm(s.nombre).includes("costa central"));
        if (!slep) return [];
        const depeLabel = SimceData.DEPE2_LABELS["5"];
        return slep.comunas.slice(0, MAX_ENTIDADES).map((cod, i) => {
          const c = SimceData.COMUNA_BY_COD.get(cod);
          return {
            id: "default_cc_" + cod,
            name: (c ? c.nom : cod) + " · " + depeLabel,
            kind: "comuna",
            comunas: [cod],
            depe2: "5",
            color: ENTITY_PALETTE[i % ENTITY_PALETTE.length],
          };
        });
      }

      function resetEntities() {
        setEntities(entidadesPorDefecto());
      }

      const containerClass = "app is-comfy ";

      return (
        <div className={containerClass}>
          <Header />
          <main className="app-main">
            <ControlsBar nivel={nivel} setNivel={setNivel} prueba={prueba} setPrueba={setPrueba} loading={loading} />
            <EntitiesBar entities={entities} setEntities={setEntities}
              openModal={(ent) => setModal({ editing: ent })} onReset={resetEntities}
              nivel={nivel} prueba={prueba}
              onShowEstab={(ent, ev) => setEstabPopup({ entity: { ...ent, _popupPos: { top: ev.clientY + window.scrollY + 8, left: ev.clientX + window.scrollX - 100 } } })} />

            {entities.length === 0 ? (
              <section className="empty-board">
                <p className="empty-board-text">
                  Agrega una comuna, un SLEP, una región, un establecimiento o el
                  nivel nacional para comenzar la comparación.
                </p>
              </section>
            ) : (
            <React.Fragment>
            <section className="results-section">
              <div className="results-head">
                <div className="results-head-top">
                  <span className="section-eyebrow">Resultados segmentados por grupo socioeconómico (GSE)</span>
                  <h2 className="results-title">Proporción de estudiantes en nivel Adecuado — {prueba}, {nivel}</h2>
                </div>
                <div className="results-head-controls">
                  <div className="section-actions">
                    <button className={"btn btn-ghost btn-small btn-toggle" + (showElemInsuf ? " is-active" : "")}
                      onClick={() => setShowElemInsuf(v => !v)}
                      aria-pressed={showElemInsuf}
                      title="Mostrar u ocultar el área Elemental + Insuficiente">
                      Mostrar niveles Elemental e Insuficiente
                    </button>
                    <IconExport label="Exportar SVG" icon="chart" onExport={() => exportarGraficosSVG({ entities, nivel, prueba })} />
                    <IconExport label="Exportar PNG" icon="image" onExport={() => exportarGraficosPNG({ entities, nivel, prueba })} />
                  </div>
                  <ChartHints showElemInsuf={showElemInsuf} />
                </div>
              </div>
              <div className="supergrid" style={{ gridTemplateColumns: `repeat(4, minmax(0, 1fr))` }}>
                {entities.map(ent => (
                  <div key={ent.id} className="supergrid-entity-head"
                    style={{ borderBottomColor: ent.color }}>
                    <span className="entity-swatch" style={{ background: ent.color }} />
                    <span className="sg-ent-name">{ent.name}</span>
                    <span className="sg-ent-meta">
                      {ent.kind === "slep" ? `SLEP · ${ent.comunas.length} comunas`
                        : ent.kind === "region" ? `Región · ${ent.comunas.length} comunas`
                        : ent.kind === "estab" ? `RBD ${ent.rbd} · ${ent.com}`
                        : ent.kind === "nacional" ? (ent.depe2 ? SimceData.DEPE2_LABELS[ent.depe2] : "Todas las dependencias")
                        : ent.kind === "group" ? `Grupo · ${ent.comunas.length} comunas`
                        : ent.depe2 ? SimceData.DEPE2_LABELS[ent.depe2] : "Comuna"}
                    </span>
                  </div>
                ))}
                {Array.from({ length: Math.max(0, 4 - entities.length) }).map((_, i) => (
                  <div key={"ph-" + i} />
                ))}
                {SimceData.GSE_LEVELS.map(gse => (
                  <React.Fragment key={gse}>
                    {entities.map(ent => {
                      if (ent.kind === "estab") {
                        const gseActual = SimceData.gseActualDeEstab({ rbd: ent.rbd, nivel, prueba });
                        const gseActualLabel = SimceData.GSE_LABELS[gseActual] || gseActual;
                        if (gse !== gseActualLabel) return <div key={ent.id + "|" + gse} />;
                      }
                      return (
                        <ChartCell key={ent.id + "|" + gse} entity={ent} gse={gse}
                          showElemInsuf={showElemInsuf} yScale={yScale}
                          nivel={nivel} prueba={prueba} />
                      );
                    })}
                    {Array.from({ length: Math.max(0, 4 - entities.length) }).map((_, i) => (
                      <div key={"ph-" + gse + "-" + i} />
                    ))}
                  </React.Fragment>
                ))}
              </div>
            </section>

            <section className="table-section">
              <div className="table-head">
                <div className="table-head-titles">
                  <span className="section-eyebrow">Tabla de resultados</span>
                  <h2 className="table-title">Entidad × GSE × Año</h2>
                </div>
                <div className="section-actions">
                  <GseFilter gseFilter={gseFilter} setGseFilter={setGseFilter} />
                  <IconExport label="Exportar CSV" icon="download" onExport={() => exportarCSV({ entities, nivel, prueba, gseFilter })} />
                </div>
              </div>
              <HeatLegend />
              <ResultsTable entities={entities} nivel={nivel} prueba={prueba} gseFilter={gseFilter}
                onCellClick={({ entity, gse, ev }) => setCellPopup({
                  entity: { ...entity, _popupPos: { top: ev.clientY + window.scrollY + 8, left: ev.clientX + window.scrollX - 100 } },
                  gse,
                })} />
            </section>
            </React.Fragment>
            )}

            <footer className="app-footer">
              <button className={"notes-toggle" + (notesOpen ? " is-open" : "")} onClick={() => setNotesOpen(!notesOpen)}>
                <Icon name="info" />
                <span>Notas metodológicas</span>
                <span className="chev"><Icon name="chevron" /></span>
              </button>
              {notesOpen && (
                <div className="notes-body">
                  <div className="notes-grid">
                    <article className="note">
                      <h4>Estándares de Aprendizaje</h4>
                      <p>Los Estándares de Aprendizaje son referentes definidos por el Ministerio de Educación que describen lo que los estudiantes deben saber y poder hacer para demostrar determinados niveles de logro de los Objetivos de Aprendizaje de las Bases Curriculares, medidos a través del Simce. Buscan responder qué tan adecuados son los aprendizajes de un estudiante en los cursos y asignaturas evaluados nacionalmente.</p>
                      <p>Comprenden tres niveles:</p>
                      <p><b>Adecuado:</b> Estudiantes que han logrado lo exigido en el currículum de manera satisfactoria, demostrando las habilidades y conocimientos básicos estipulados para el periodo evaluado.</p>
                      <p><b>Elemental:</b> Estudiantes que han logrado lo exigido en el currículum de manera parcial, demostrando solo las habilidades y conocimientos más elementales estipulados para el periodo evaluado.</p>
                      <p><b>Insuficiente:</b> Estudiantes que no logran demostrar consistentemente las habilidades y conocimientos más elementales estipulados para el periodo evaluado.</p>
                    </article>
                    <article className="note">
                      <h4>Servicios Locales de Educación Pública (SLEP)</h4>
                      <p>Los SLEP son los organismos públicos que, en el marco de la Ley 21.040 (Sistema de Educación Pública), asumen progresivamente la administración de los establecimientos que antes dependían de los municipios. Cada SLEP recibe sus establecimientos en un <b>año de traspaso</b> específico.</p>
                      <p>En esta herramienta, los establecimientos se clasifican según su dependencia <b>actual</b>. Un SLEP agrupa a sus establecimientos en toda la serie histórica, incluidos los años anteriores a su traspaso, cuando la gestión era municipal. Por lo tanto, <b>las cifras previas al año de traspaso no son atribuibles a la gestión del SLEP</b>, sino a la administración municipal de ese periodo. Los SLEP con traspaso posterior al último año con datos se incluyen con los establecimientos que administrarán, cuyos resultados corresponden íntegramente a la gestión municipal previa.</p>
                    </article>
                    <article className="note">
                      <h4>Fórmula de agregación ponderada</h4>
                      <p>Para cada entidad, GSE y año, el % en nivel Adecuado se calcula como el promedio ponderado por número de estudiantes evaluados:</p>
                      <code className="formula">%adec = Σ(nalu × palu_eda_ade / 100) / Σ(nalu) × 100</code>
                      <p>Donde <code>nalu</code> es el número de estudiantes evaluados y <code>palu_eda_ade</code> el % en nivel Adecuado, ambos por combinación de establecimiento × prueba × nivel. Este método garantiza que un establecimiento con 200 estudiantes evaluados tenga el doble de peso que uno con 100, independientemente del nivel de agrupación (comuna, SLEP, región).</p>
                    </article>
                    <article className="note">
                      <h4>Regla GSE dinámico</h4>
                      <p>El GSE de cada establecimiento se toma del año correspondiente. <b>No se imputa entre años</b>: si un establecimiento cambia de GSE entre 2018 y 2022, aparece en la categoría vigente cada año.</p>
                    </article>
                    <article className="note">
                      <h4>Gap 2019–2021</h4>
                      <p>La aplicación del Simce en 2019, 2020 y 2021 fue interrumpida por el estallido social y la pandemia. En los gráficos aparece una banda sombreada y las líneas no se conectan a través del gap.</p>
                    </article>
                    <article className="note">
                      <h4>Datos preliminares 2025</h4>
                      <p>Los resultados de 2025 son <b>preliminares</b> y están sujetos a revisión por la Agencia de Calidad de la Educación. Se marcan con asterisco (*) en todos los gráficos y tablas.</p>
                    </article>
                  </div>
                  <div className="notes-sources">
                    <span>Fuente: Agencia de Calidad de la Educación · Bases Simce 2014–2025. Procesamiento: SLEP Costa Central.</span>
                    <span>Área de Monitoreo y Seguimiento de Procesos y Resultados Educativos · Contacto: {["tomas", "gonzalez"].join(".") + String.fromCharCode(64) + ["slepcostacentral", "gob", "cl"].join(".")}</span>
                  </div>
                </div>
              )}
            </footer>
          </main>

          {chartPopup && (
            <EstabPopup
              entity={chartPopup.entity}
              nivel={nivel}
              prueba={prueba}
              gse={chartPopup.gse}
              year={chartPopup.year}
              onClose={() => setChartPopup(null)}
            />
          )}

          {estabPopup && (
            <EstabPopup
              entity={estabPopup.entity}
              nivel={nivel}
              prueba={prueba}
              onClose={() => setEstabPopup(null)}
            />
          )}

          {cellPopup && (
            <EstabPopup
              entity={cellPopup.entity}
              nivel={nivel}
              prueba={prueba}
              gse={cellPopup.gse}
              onClose={() => setCellPopup(null)}
            />
          )}

          {modal && (
            <AddEntityModal
              editing={modal.editing}
              takenColors={entities.map(e => e.color)}
              slotsLibres={MAX_ENTIDADES - entities.length}
              onSave={saveEntity}
              onSaveMany={saveEntities}
              onCancel={() => setModal(null)}
            />
          )}
        </div>
      );
    }

    // Render
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
